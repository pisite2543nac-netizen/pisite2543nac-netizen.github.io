<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Quest - เกมเรียนรู้ HTML</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.tailwindcss.com"></script>
<style>
:root{--bg:#0d1117;--card:#161b22;--card2:#1c2333;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#00ff88;--accent-dim:#00cc6a;--gold:#e3b341;--danger:#ff6b6b;--info:#79c0ff;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
#app{position:relative;z-index:1;min-height:100vh;}
.cf{font-family:'Fira Code',monospace;}
.xp-outer{background:var(--border);border-radius:999px;height:10px;overflow:hidden;}
.xp-inner{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));border-radius:999px;transition:width .8s cubic-bezier(.25,1,.5,1);box-shadow:0 0 10px rgba(0,255,136,.4);}
.gc{background:var(--card);border:1px solid var(--border);border-radius:16px;transition:all .3s ease;}
.gc:hover{border-color:rgba(0,255,136,.25);}
.bp{background:linear-gradient(135deg,var(--accent-dim),var(--accent));color:#0d1117;font-weight:700;padding:13px 32px;border-radius:12px;border:none;cursor:pointer;font-size:1rem;font-family:'Kanit',sans-serif;transition:all .3s ease;box-shadow:0 4px 20px rgba(0,255,136,.3);display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.bp:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(0,255,136,.5);}.bp:active{transform:translateY(0);}.bp:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
.bs{background:var(--card2);color:var(--text);font-weight:600;padding:11px 24px;border-radius:12px;border:1px solid var(--border);cursor:pointer;font-size:.9rem;font-family:'Kanit',sans-serif;transition:all .3s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
.bs:hover{border-color:var(--accent);color:var(--accent);}
.bsm{padding:8px 18px;font-size:.82rem;border-radius:10px;}
.code-block{background:#0a0e14;border:1px solid var(--border);border-radius:12px;padding:18px;overflow-x:auto;font-family:'Fira Code',monospace;font-size:.8rem;line-height:1.8;tab-size:2;white-space:pre;}
.code-block .tag{color:#7ee787;}.code-block .attr{color:#79c0ff;}.code-block .val{color:#ffa657;}.code-block .cmt{color:#8b949e;font-style:italic;}.code-block .doctype{color:#8b949e;}
.pf{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;}
.pf iframe{width:100%;height:180px;border:none;display:block;}
.pb{background:var(--card);padding:7px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);}
.pd{width:10px;height:10px;border-radius:50%;}
.ew{display:flex;background:#0a0e14;border:2px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .4s,box-shadow .4s;min-height:240px;}
.ew.ok{border-color:var(--accent);box-shadow:0 0 20px rgba(0,255,136,.15);}
.ew.err{border-color:var(--danger);box-shadow:0 0 15px rgba(255,107,107,.15);}
.ln{padding:14px 0;min-width:40px;text-align:right;padding-right:10px;color:#484f58;font-family:'Fira Code',monospace;font-size:.8rem;line-height:1.8;user-select:none;border-right:1px solid var(--border);overflow:hidden;background:#0a0e14;flex-shrink:0;}
.ce{flex:1;padding:14px;background:transparent;color:var(--text);font-family:'Fira Code',monospace;font-size:.8rem;line-height:1.8;border:none;outline:none;resize:none;tab-size:2;white-space:pre;overflow:auto;min-height:240px;}
.ce::selection{background:rgba(0,255,136,.2);}
.ci{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;transition:all .3s;font-size:.88rem;}
.ci.pass{background:rgba(0,255,136,.08);color:var(--accent);}.ci.fail{background:rgba(255,107,107,.08);color:var(--danger);}.ci.pend{background:var(--card2);color:var(--muted);}
.ch{font-size:.76rem;color:var(--muted);margin-top:4px;margin-left:30px;padding:6px 10px;background:rgba(227,179,65,.08);border-radius:8px;border-left:3px solid var(--gold);display:none;}.ci.fail .ch{display:block;}
.mn{position:relative;cursor:pointer;transition:all .3s;}.mn.locked{opacity:.4;cursor:not-allowed;}.mn.locked:hover{opacity:.5;}
.mn.done .nc{background:var(--accent);border-color:var(--accent);}.mn.cur .nc{border-color:var(--accent);animation:np 2s ease-in-out infinite;}
.nc{width:50px;height:50px;border-radius:50%;border:3px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .3s;flex-shrink:0;}
.mc{width:3px;height:36px;margin:0 auto;border-radius:2px;}.mc.d{background:var(--accent);}.mc.p{background:var(--border);}
.coin-i{color:var(--gold);filter:drop-shadow(0 0 4px rgba(227,179,65,.5));}
.auth-card{max-width:440px;width:100%;}
.tab-btn{padding:10px 0;flex:1;text-align:center;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;color:var(--muted);}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.input-field{width:100%;padding:12px 16px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Kanit',sans-serif;font-size:.95rem;outline:none;transition:border-color .3s;}
.input-field:focus{border-color:var(--accent);}.input-field::placeholder{color:var(--muted);}
.admin-toggle{cursor:pointer;transition:color .3s;}.admin-toggle:hover{color:var(--gold);}
.admin-box{max-height:0;overflow:hidden;transition:max-height .4s ease,opacity .3s ease;opacity:0;}.admin-box.open{max-height:200px;opacity:1;}
.sb{animation:si .4s ease forwards;border-radius:12px;padding:12px 20px;display:flex;align-items:center;gap:10px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.4);pointer-events:auto;}
.sb.lv{animation:so .3s ease forwards;}
.sb-s{background:rgba(0,255,136,.15);border:1px solid rgba(0,255,136,.3);color:var(--accent);}.sb-e{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.3);color:var(--danger);}.sb-i{background:rgba(227,179,65,.15);border:1px solid rgba(227,179,65,.3);color:var(--gold);}
.suc-b{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;}
.err-b{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;}
.confetti{position:fixed;width:10px;height:10px;z-index:100;animation:cfa linear forwards;pointer-events:none;}
.char-card{background:linear-gradient(145deg,var(--card),var(--card2));border:1px solid var(--border);border-radius:20px;overflow:hidden;transition:all .3s;}
.char-card:hover{border-color:rgba(0,255,136,.3);box-shadow:0 0 30px rgba(0,255,136,.08);}
.char-stage-bar{height:6px;border-radius:99px;background:var(--border);overflow:hidden;}
.char-stage-fill{height:100%;border-radius:99px;transition:width .6s ease;}
.evo-overlay{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px;}
.evo-glow{position:absolute;border-radius:50%;animation:evoPulse 1.5s ease-in-out infinite;}
@keyframes np{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.4);}50%{box-shadow:0 0 0 12px rgba(0,255,136,0);}}
@keyframes fiu{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes fi{from{opacity:0;}to{opacity:1;}}
@keyframes sd{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
@keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes gl{0%,100%{text-shadow:0 0 20px rgba(0,255,136,.3);}50%{text-shadow:0 0 40px rgba(0,255,136,.6),0 0 80px rgba(0,255,136,.2);}}
@keyframes sc{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes cfa{0%{transform:translateY(-100vh) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
@keyframes si{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes so{from{transform:translateX(0);opacity:1;}to{transform:translateX(100%);opacity:0;}}
@keyframes evoPulse{0%,100%{transform:scale(1);opacity:.3;}50%{transform:scale(1.5);opacity:.1;}}
@keyframes charFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes evolveIn{0%{transform:scale(0) rotate(-180deg);opacity:0;}60%{transform:scale(1.2) rotate(10deg);opacity:1;}100%{transform:scale(1) rotate(0deg);opacity:1;}}
.afiu{animation:fiu .6s ease forwards;}.afi{animation:fi .5s ease forwards;}.asd{animation:sd .4s ease forwards;}.afl{animation:fl 3s ease-in-out infinite;}.agl{animation:gl 3s ease-in-out infinite;}.char-float{animation:charFloat 3s ease-in-out infinite;}.evolve-in{animation:evolveIn .8s ease forwards;}
.s1{animation-delay:.1s;opacity:0;}.s2{animation-delay:.2s;opacity:0;}.s3{animation-delay:.3s;opacity:0;}.s4{animation-delay:.4s;opacity:0;}.s5{animation-delay:.5s;opacity:0;}
::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(max-width:768px){.code-block,.ce,.ln{font-size:.7rem;}.nc{width:42px;height:42px;font-size:.95rem;}.mc{height:28px;}.ew,.ce{min-height:180px;}.admin-table-wrap{font-size:.78rem;}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
</style>
</head>
<body>
<canvas id="bgCanvas" aria-hidden="true"></canvas>
<div id="app" role="main"></div>
<div id="tc" style="position:fixed;top:20px;right:20px;z-index:80;display:flex;flex-direction:column;gap:10px;pointer-events:none;"></div>
<div id="oc"></div>
<script>
/* ================================================================
   ฐานข้อมูล - Schema พร้อมสำหรับเชื่อมต่อ Database ในอนาคต
   โครงสร้างนี้ออกแบบมาให้ map ตรงกับตาราง SQL หรือ NoSQL collection
   ----------------------------------------------------------------
   TABLE: players
     id            - PRIMARY KEY (auto)
     student_id    - UNIQUE, NOT NULL (รหัสนักศึกษา)
     name          - VARCHAR(100)
     room          - VARCHAR(50)
     password_hash - VARCHAR(255)
     xp            - INT DEFAULT 0
     coins         - INT DEFAULT 0
     char_stage    - INT DEFAULT 0
     max_streak    - INT DEFAULT 0
     created_at    - TIMESTAMP
     updated_at    - TIMESTAMP

   TABLE: level_scores
     id          - PRIMARY KEY
     player_id   - FK -> players.id
     level_id    - INT
     score       - INT
     total       - INT
     attempts    - INT DEFAULT 1
     completed_at - TIMESTAMP
     UNIQUE(player_id, level_id)

   TABLE: practice_logs
     id          - PRIMARY KEY
     player_id   - FK -> players.id
     level_id    - INT
     completed   - BOOLEAN
     completed_at - TIMESTAMP

   TABLE: test_logs
     id          - PRIMARY KEY
     player_id   - FK -> players.id
     level_id    - INT
     test_index  - INT
     passed      - BOOLEAN
     attempts    - INT DEFAULT 1
     completed_at - TIMESTAMP

   TABLE: session_logs
     id          - PRIMARY KEY
     player_id   - FK -> players.id
     action      - VARCHAR(50)
     detail      - TEXT
     created_at  - TIMESTAMP
   ================================================================ */
const ADMIN_CODE='admin1234';
const DB_SCHEMA={
  version:'1.0.0',
  tables:['players','level_scores','practice_logs','test_logs','session_logs'],
  exportKey:'hq_export_v1'
};

/* ================================================================
   ระบบโมเดลตัวละคร - 7 ขั้นวิวัฒนาการ
   ================================================================ */
const CHAR_STAGES=[
  {id:0,name:'คนธรรมดา',minPct:0,desc:'เริ่มต้นเดินทางจากผู้คนธรรมดา',color:'#a0aec0'},
  {id:1,name:'ผู้ฝึกหัด',minPct:12,desc:'ได้รับชุดฝึกหัดและเข็มขัด',color:'#68d391'},
  {id:2,name:'นักเรียนเวทย์',minPct:25,desc:'ได้รับผ้าคลุมเวทย์แห่งความรู้',color:'#4fd1c5'},
  {id:3,name:'นักรบ',minPct:40,desc:'ได้ครอบครองดาบแห่งโค้ด',color:'#63b3ed'},
  {id:4,name:'อัศวิน',minPct:55,desc:'สวมเกราะและโล่ป้องกัน',color:'#b794f4'},
  {id:5,name:'อัศวินปีก',minPct:72,desc:'เกิดปีกแห่งเสรีภาพ',color:'#f6ad55'},
  {id:6,name:'ผู้พิชิตสูงสุด',minPct:90,desc:'ปลดปล่อยพลังสูงสุดแห่ง HTML',color:'#00ff88'}
];

/* สร้าง SVG ตัวละครตามขั้น */
function getCharSVG(stage,w=180){
  const h=w*1.6;let o=`<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}" xmlns="http://www.w3.org/2000/svg">`;
  const cx=w/2;
  /* เกาะรังรักษ์/แสงรอบตัวสำหรับขั้น 6 */
  if(stage>=6){
    o+=`<circle cx="${cx}" cy="${h*.42}" r="${w*.44}" fill="none" stroke="#00ff88" stroke-width="2" opacity=".25"><animate attributeName="r" values="${w*.4};${w*.48};${w*.4}" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values=".15;.35;.15" dur="2s" repeatCount="indefinite"/></circle>`;
    o+=`<circle cx="${cx}" cy="${h*.42}" r="${w*.36}" fill="none" stroke="#00ff88" stroke-width="1" opacity=".15"><animate attributeName="r" values="${w*.34};${w*.4};${w*.34}" dur="1.5s" repeatCount="indefinite"/></circle>`;
  }
  /* ปีก ขั้น 5+ */
  if(stage>=5){
    const wc=stage>=6?'#00ff88':'#a0d8ef',wo=stage>=6?.6:.7;
    o+=`<path d="M${cx-w*.18} ${h*.28} Q${cx-w*.5} ${h*.05} ${cx-w*.42} ${h*.32} Q${cx-w*.35} ${h*.2} ${cx-w*.15} ${h*.38}" fill="${wc}" opacity="${wo}"/>`;
    o+=`<path d="M${cx+w*.18} ${h*.28} Q${cx+w*.5} ${h*.05} ${cx+w*.42} ${h*.32} Q${cx+w*.35} ${h*.2} ${cx+w*.15} ${h*.38}" fill="${wc}" opacity="${wo}"/>`;
    if(stage>=6){
      o+=`<path d="M${cx-w*.22} ${h*.32} Q${cx-w*.55} ${h*.1} ${cx-w*.48} ${h*.38} Q${cx-w*.38} ${h*.25} ${cx-w*.18} ${h*.42}" fill="#00ff88" opacity=".35"/>`;
      o+=`<path d="M${cx+w*.22} ${h*.32} Q${cx+w*.55} ${h*.1} ${cx+w*.48} ${h*.38} Q${cx+w*.38} ${h*.25} ${cx+w*.18} ${h*.42}" fill="#00ff88" opacity=".35"/>`;
    }
  }
  /* ผ้าคลุม ขั้น 2+ */
  if(stage>=2){
    const cc=stage>=4?'#4a5568':stage>=3?'#2d3748':'#718096';
    o+=`<path d="M${cx-w*.14} ${h*.27} Q${cx-w*.22} ${h*.68} ${cx-w*.17} ${h*.88} L${cx+w*.17} ${h*.88} Q${cx+w*.22} ${h*.68} ${cx+w*.14} ${h*.27}" fill="${cc}" opacity=".75"/>`;
  }
  /* ขา */
  o+=`<rect x="${cx-w*.13}" y="${h*.6}" width="${w*.09}" height="${h*.24}" rx="4" fill="#2d3748"/>`;
  o+=`<rect x="${cx+w*.04}" y="${h*.6}" width="${w*.09}" height="${h*.24}" rx="4" fill="#2d3748"/>`;
  o+=`<ellipse cx="${cx-w*.085}" cy="${h*.87}" rx="${w*.07}" ry="${w*.04}" fill="#1a202c"/>`;
  o+=`<ellipse cx="${cx+w*.085}" cy="${h*.87}" rx="${w*.07}" ry="${w*.04}" fill="#1a202c"/>`;
  /* ตัว */
  const bc=stage>=4?'#4a5568':stage>=1?'#276749':'#a0aec0';
  o+=`<rect x="${cx-w*.18}" y="${h*.27}" width="${w*.36}" height="${h*.35}" rx="8" fill="${bc}"/>`;
  /* เกราะ ขั้น 4+ */
  if(stage>=4){
    o+=`<rect x="${cx-w*.16}" y="${h*.29}" width="${w*.32}" height="${h*.13}" rx="4" fill="#718096" stroke="#a0aec0" stroke-width="1"/>`;
    o+=`<line x1="${cx}" y1="${h*.29}" x2="${cx}" y2="${h*.42}" stroke="#a0aec0" stroke-width="1"/>`;
    o+=`<circle cx="${cx}" cy="${h*.355}" r="${w*.025}" fill="#e3b341"/>`;
  }
  /* แขนซ้าย */
  if(stage>=4){
    o+=`<rect x="${cx-w*.28}" y="${h*.3}" width="${w*.1}" height="${h*.2}" rx="5" fill="${bc}"/>`;
  }else{
    o+=`<rect x="${cx-w*.26}" y="${h*.3}" width="${w*.09}" height="${h*.22}" rx="5" fill="${bc}"/>`;
  }
  /* แขนขวา + ดาบ ขั้น 3+ */
  if(stage>=3){
    o+=`<rect x="${cx+w*.17}" y="${h*.28}" width="${w*.1}" height="${h*.19}" rx="5" fill="${bc}"/>`;
    const sc=stage>=6?'#00ff88':'#e2e8f0';
    o+=`<line x1="${cx+w*.22}" y1="${h*.12}" x2="${cx+w*.22}" y2="${h*.47}" stroke="${sc}" stroke-width="3" stroke-linecap="round"/>`;
    o+=`<line x1="${cx+w*.16}" y1="${h*.47}" x2="${cx+w*.28}" y2="${h*.47}" stroke="#e3b341" stroke-width="3" stroke-linecap="round"/>`;
    if(stage>=6)o+=`<line x1="${cx+w*.22}" y1="${h*.12}" x2="${cx+w*.22}" y2="${h*.47}" stroke="#00ff88" stroke-width="7" opacity=".25"/>`;
  }else{
    o+=`<rect x="${cx+w*.17}" y="${h*.3}" width="${w*.09}" height="${h*.22}" rx="5" fill="${bc}"/>`;
  }
  /* โล่ ขั้น 4+ */
  if(stage>=4){
    o+=`<ellipse cx="${cx-w*.28}" cy="${h*.43}" rx="${w*.09}" ry="${w*.11}" fill="#4a5568" stroke="#a0aec0" stroke-width="1.5"/>`;
    o+=`<text x="${cx-w*.28}" y="${h*.45}" text-anchor="middle" font-size="${w*.085}" fill="#00ff88" font-weight="bold" font-family="Fira Code,monospace">&lt;/&gt;</text>`;
  }
  /* หัว */
  o+=`<circle cx="${cx}" cy="${h*.17}" r="${w*.14}" fill="#f7c59f"/>`;
  /* ผม */
  o+=`<path d="M${cx-w*.15} ${h*.14} Q${cx} ${h*.01} ${cx+w*.15} ${h*.14} Q${cx+w*.12} ${h*.07} ${cx} ${h*.05} Q${cx-w*.12} ${h*.07} ${cx-w*.15} ${h*.14}" fill="#2d3748"/>`;
  /* ตา */
  o+=`<circle cx="${cx-w*.05}" cy="${h*.17}" r="${w*.018}" fill="#1a202c"/>`;
  o+=`<circle cx="${cx+w*.05}" cy="${h*.17}" r="${w*.018}" fill="#1a202c"/>`;
  /* ปาก */
  if(stage>=6){
    o+=`<path d="M${cx-w*.04} ${h*.215} Q${cx} ${h*.24} ${cx+w*.04} ${h*.215}" fill="none" stroke="#e53e3e" stroke-width="2" stroke-linecap="round"/>`;
  }else{
    o+=`<path d="M${cx-w*.04} ${h*.215} Q${cx} ${h*.235} ${cx+w*.04} ${h*.215}" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-linecap="round"/>`;
  }
  /* มงกุฎ ขั้น 6 */
  if(stage>=6){
    o+=`<path d="M${cx-w*.12} ${h*.055} L${cx-w*.09} ${h*.01} L${cx-w*.04} ${h*.04} L${cx} ${h*-.01} L${cx+w*.04} ${h*.04} L${cx+w*.09} ${h*.01} L${cx+w*.12} ${h*.055}" fill="#e3b341" stroke="#d69e2e" stroke-width="1"/>`;
    o+=`<circle cx="${cx}" cy="${h*.005}" r="${w*.02}" fill="#ff6b6b"/>`;
  }
  /* เข็มขัด ขั้น 1+ */
  if(stage>=1){
    o+=`<rect x="${cx-w*.18}" y="${h*.55}" width="${w*.36}" height="${w*.04}" rx="2" fill="#744210"/>`;
    o+=`<rect x="${cx-w*.035}" y="${h*.545}" width="${w*.07}" height="${w*.05}" rx="2" fill="#e3b341"/>`;
  }
  o+=`</svg>`;return o;
}

/* คำนวณขั้นตัวละครจากคะแนนสอบรวม */
function getCharStage(){
  let totalS=0,totalP=0;
  LS.forEach(l=>{if(S.lScores[l.id]){totalS+=S.lScores[l.id].score;totalP+=S.lScores[l.id].total;}});
  const pct=totalP>0?(totalS/totalP)*100:0;
  let st=0;for(let i=CHAR_STAGES.length-1;i>=0;i--){if(pct>=CHAR_STAGES[i].minPct){st=i;break;}}
  return{stage:st,pct:Math.round(pct),totalS,totalP};
}
function getCharNextPct(cur){const i=CHAR_STAGES.findIndex(s=>s.id===cur);return i<CHAR_STAGES.length-1?CHAR_STAGES[i+1].minPct:100;}

const AX={c:null,init(){if(!this.c)this.c=new(window.AudioContext||window.webkitAudioContext)();},p(t){try{this.init();const o=this.c.createOscillator(),g=this.c.createGain();o.connect(g);g.connect(this.c.destination);g.gain.value=.06;const n=this.c.currentTime;if(t==='ok'){o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+.1);o.frequency.setValueAtTime(784,n+.2);g.gain.exponentialRampToValueAtTime(.001,n+.4);o.start(n);o.stop(n+.4);}else if(t==='no'){o.type='sawtooth';o.frequency.setValueAtTime(300,n);o.frequency.exponentialRampToValueAtTime(150,n+.3);g.gain.exponentialRampToValueAtTime(.001,n+.3);o.start(n);o.stop(n+.3);}else if(t==='lv'){o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+.12);o.frequency.setValueAtTime(784,n+.24);o.frequency.setValueAtTime(1047,n+.36);g.gain.exponentialRampToValueAtTime(.001,n+.6);o.start(n);o.stop(n+.6);}else if(t==='co'){o.type='triangle';o.frequency.setValueAtTime(1200,n);o.frequency.setValueAtTime(1600,n+.06);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.start(n);o.stop(n+.15);}else if(t==='cl'){o.type='sine';o.frequency.setValueAtTime(800,n);g.gain.value=.03;g.gain.exponentialRampToValueAtTime(.001,n+.07);o.start(n);o.stop(n+.07);}else if(t==='evo'){o.frequency.setValueAtTime(400,n);o.frequency.exponentialRampToValueAtTime(1200,n+.5);o.frequency.exponentialRampToValueAtTime(800,n+.8);o.frequency.setValueAtTime(1047,n+.8);o.frequency.setValueAtTime(1319,n+1);g.gain.exponentialRampToValueAtTime(.001,n+1.3);o.start(n);o.stop(n+1.3);}else if(t==='win'){o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+.1);o.frequency.setValueAtTime(784,n+.2);o.frequency.setValueAtTime(1047,n+.3);o.frequency.setValueAtTime(1319,n+.4);g.gain.exponentialRampToValueAtTime(.001,n+.7);o.start(n);o.stop(n+.7);}}catch(e){}}};

const bgC=document.getElementById('bgCanvas'),bgX=bgC.getContext('2d');let bgS=[];
function initBg(){bgC.width=innerWidth;bgC.height=innerHeight;bgS=[];const sy=['<','>','/','=','"','}','{',';','#','</>','<div>','<p>','<h1>','<table>','<form>','<svg>'];const cn=Math.floor((bgC.width*bgC.height)/28000);for(let i=0;i<cn;i++)bgS.push({x:Math.random()*bgC.width,y:Math.random()*bgC.height,s:sy[Math.floor(Math.random()*sy.length)],sz:10+Math.random()*13,sp:.1+Math.random()*.25,op:.03+Math.random()*.06,dr:(Math.random()-.5)*.2});}
function aBg(){bgX.clearRect(0,0,bgC.width,bgC.height);bgS.forEach(s=>{s.y-=s.sp;s.x+=s.dr;if(s.y<-30){s.y=bgC.height+30;s.x=Math.random()*bgC.width;}if(s.x<-30)s.x=bgC.width+30;if(s.x>bgC.width+30)s.x=-30;bgX.font=`${s.sz}px "Fira Code",monospace`;bgX.fillStyle=`rgba(0,255,136,${s.op})`;bgX.fillText(s.s,s.x,s.y);});requestAnimationFrame(aBg);}
addEventListener('resize',()=>{bgC.width=innerWidth;bgC.height=innerHeight;});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hlC(c){let h=esc(c);h=h.replace(/(&lt;!--[\s\S]*?--&gt;)/g,'<span class="cmt">$1</span>');h=h.replace(/(&lt;!DOCTYPE\s+html&gt;)/gi,'<span class="doctype">$1</span>');h=h.replace(/(&lt;\/?)([\w-]+)/g,'$1<span class="tag">$2</span>');h=h.replace(/([\w-]+)(=)(&quot;)(.*?)(&quot;)/g,'<span class="attr">$1</span>$2<span class="val">$3$4$5</span>');return h;}
function gLv(xp){let l=LVLS[0];for(const v of LVLS)if(xp>=v.m)l=v;return l;}
function gLi(xp){let i=0;for(let j=0;j<LVLS.length;j++)if(xp>=LVLS[j].m)i=j;return i;}
function gNx(xp){const i=gLi(xp);return i>=LVLS.length-1?LVLS[i].m:LVLS[i+1].m;}
function gCx(xp){return LVLS[gLi(xp)].m;}
function gSt(id){return S.lScores[id]?'done':(id===1||S.lScores[id-1]?'cur':'locked');}
function allDone(){return LS.every(l=>S.lScores[l.id]);}
function toast(m,t='s'){const c=document.getElementById('tc');const d=document.createElement('div');d.className=`sb sb-${t}`;const ic={s:'fa-circle-check',e:'fa-circle-xmark',i:'fa-circle-info'};d.innerHTML=`<i class="fa-solid ${ic[t]||ic.i}"></i><span>${m}</span>`;c.appendChild(d);setTimeout(()=>d.classList.add('lv'),2500);setTimeout(()=>d.remove(),2900);}
function conf(n=40){const cs=['#00ff88','#e3b341','#ff6b6b','#79c0ff','#ffa657','#d2a8ff'];for(let i=0;i<n;i++){const p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=cs[Math.floor(Math.random()*cs.length)];p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.animationDuration=(2+Math.random()*3)+'s';p.style.animationDelay=Math.random()*1.2+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),5500);}}
function last3(id){return id.length>=3?id.slice(-3):id;}
function now(){return new Date().toISOString();}

/* ================================================================
   ระบบผู้ใช้ + ฐานข้อมูล localStorage (พร้อมสำหรับย้ายไป DB จริง)
   ================================================================ */
function getU(){try{return JSON.parse(localStorage.getItem('hq_u'))||[];}catch(e){return[];}}
function saveU(u){localStorage.setItem('hq_u',JSON.stringify(u));}
function findU(sid){return getU().find(u=>u.sid===sid);}
function regU(name,sid,room,pw){
  if(!name.trim())return'กรุณากรอกชื่อ';if(!sid.trim())return'กรุณากรอกรหัสนักศึกษา';if(sid.trim().length<3)return'รหัสนักศึกษาต้องมีอย่างน้อย 3 ตัว';if(!room.trim())return'กรุณากรอกห้องเรียน';if(pw.length<3)return'รหัสผ่านต้องมีอย่างน้อย 3 ตัวอักษร';if(findU(sid.trim()))return'รหัสนักศึกษานี้มีอยู่แล้ว';
  const u=getU();u.push({name:name.trim(),sid:sid.trim(),room:room.trim(),password:pw,xp:0,coins:0,char_stage:0,lScores:{},pDone:{},tDone:{},maxStreak:0,created_at:now(),updated_at:now()});saveU(u);logSession(sid.trim(),'register','สมัครสมาชิกใหม่');return'ok';
}
function loginU(sid,pw){const u=findU(sid.trim());if(!u)return'ไม่พบรหัสนักศึกษานี้';if(u.password!==pw)return'รหัสผ่านไม่ถูกต้อง';logSession(u.sid,'login','เข้าสู่ระบบ');return u;}
function saveCur(){
  if(!S.user||S.user.role==='admin')return;
  const cs=getCharStage();
  const u=getU();const i=u.findIndex(x=>x.sid===S.user.sid);
  if(i>=0){u[i]={...u[i],xp:S.xp,coins:S.coins,char_stage:cs.stage,lScores:S.lScores,pDone:S.pDone,tDone:S.tDone,maxStreak:S.maxStreak,updated_at:now()};saveU(u);}
}
function loadU(u){S.xp=u.xp||0;S.coins=u.coins||0;S.lScores=u.lScores||{};S.pDone=u.pDone||{};S.tDone=u.tDone||{};S.maxStreak=u.maxStreak||0;S.prevLvl=gLi(S.xp);S.prevCharStage=getCharStage().stage;}

/* บันทึก Log สำหรับส่งไป DB ในอนาคต */
function logSession(sid,action,detail){
  const logs=JSON.parse(localStorage.getItem('hq_logs')||'[]');
  logs.push({sid,action,detail,created_at:now()});
  if(logs.length>500)logs.splice(0,logs.length-500);
  localStorage.setItem('hq_logs',JSON.stringify(logs));
}

      <li class="flex items-start gap-3"><i class="fa-solid fa-chevron-right mt-1 flex-shrink-0" style="color:var(--accent);font-size:.65rem;"></i>มี ${l.tests.length} ข้อ ต้องเขียนโค้ด HTML เองทั้งหมด</li>

/* ================================================================
   ทดสอบ (ไม่แสดงผลถูก/ผิด)
   ================================================================ */

  const l=LS[S.curL],t=l.tests[S.curQ];

    <div class="flex items-center justify-between mb-6 afiu">

      <div class="xp-outer" style="width:120px;"><div class="xp-inner" style="width:${((S.curQ+1)/l.tests.length)*100}%;background:linear-gradient(90deg,#3182ce,var(--info));"></div></div>
    </div>
    <div class="gc p-5 mb-6 afiu s1"><h2 class="font-bold text-lg mb-1">${t.title}</h2><p class="text-sm" style="color:var(--muted);">${t.desc}</p></div>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-4 mb-6 afiu s2">
      <div><div class="flex items-center gap-2 mb-2"><i class="fa-solid fa-code" style="color:var(--accent);"></i><span class="font-semibold text-sm">โค้ดของคุณ</span></div><div class="ew" id="eWrap"><div class="ln" id="eLn">1</div><textarea class="ce" id="eCode" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off">${esc(t.start)}</textarea></div></div>
      <div><div class="flex items-center gap-2 mb-2"><i class="fa-solid fa-eye" style="color:var(--gold);"></i><span class="font-semibold text-sm">พรีวิว</span></div><div class="pf" style="height:calc(240px + 32px);"><div class="pb"><div class="pd" style="background:#ff5f57;"></div><div class="pd" style="background:#febc2e;"></div><div class="pd" style="background:#28c840;"></div><span class="ml-3 text-xs" style="color:var(--muted);">live</span></div><iframe id="pFrame" style="width:100%;height:calc(100% - 33px);border:none;" sandbox="allow-scripts" title="พรีวิว"></iframe></div></div>
    </div>
    <div class="flex justify-between afiu s3">
      ${S.curQ>0?'<button class="bs" data-action="tPrev"><i class="fa-solid fa-arrow-left mr-2"></i>ข้อก่อนหน้า</button>':'<div></div>'}
      <button class="bp" data-action="tNext">${S.curQ<l.tests.length-1?'<i class="fa-solid fa-arrow-right mr-2"></i>ข้อต่อไป':'<i class="fa-solid fa-flag-checkered mr-2"></i>ส่งคำตอบ'}</button>
    </div>
  </main>`;initEd();
}

/* ================================================================
   ผลทดสอบ
   ================================================================ */
function rTR(){
  const l=LS[S.curL],ts=S.tSession;
  const pct=ts.totalChecks>0?Math.round((ts.passedChecks/ts.totalChecks)*100):0;
  const passed=pct>=60;
  const xpEarned=ts.xpEarned,coinsEarned=ts.coinsEarned;
  app.innerHTML=`${tBar()}<main class="max-w-3xl mx-auto px-4 py-8 text-center">
    <div class="afiu">${passed?`<div class="text-6xl mb-4"><i class="fa-solid fa-trophy" style="color:var(--gold);"></i></div><h1 class="text-3xl font-bold mb-2" style="color:var(--accent);">สำเร็จ!</h1>`:`<div class="text-6xl mb-4"><i class="fa-solid fa-rotate-right" style="color:var(--danger);"></i></div><h1 class="text-3xl font-bold mb-2" style="color:var(--danger);">ยังไม่ผ่าน</h1>`}
    <p class="mb-6" style="color:var(--muted);">${l.title}</p></div>
    <div class="gc p-6 mb-6 afiu s1">
      <div class="text-5xl font-black mb-2" style="color:${passed?'var(--accent)':'var(--danger)'};">${pct}%</div>
      <p class="mb-4" style="color:var(--muted);">${ts.passedChecks} / ${ts.totalChecks} ผ่าน (เกณฑ์ 60%)</p>
      <div class="space-y-2 text-left">${ts.results.map(r=>`<div class="ci ${r.passed?'pass':'fail'}"><span style="width:20px;text-align:center;flex-shrink:0;"><i class="fa-solid ${r.passed?'fa-circle-check':'fa-circle-xmark'}" style="font-size:.8rem;"></i></span><span class="text-sm">${r.title}</span><span class="ml-auto text-xs">${r.passed}/${r.total}</span></div>`).join('')}</div>
    </div>
    ${passed?`<div class="gc p-5 mb-6 afiu s2"><div class="flex justify-center gap-8">
      <div class="text-center"><div class="text-2xl font-black" style="color:var(--accent);">+${xpEarned}</div><div class="text-xs" style="color:var(--muted);">XP</div></div>
      <div class="text-center"><div class="text-2xl font-black coin-i">+${coinsEarned}</div><div class="text-xs" style="color:var(--muted);">เหรียญ</div></div>
    </div></div>`:''}
    <div class="flex flex-wrap gap-3 justify-center afiu s3">
      ${!passed?`<button class="bp" data-action="retake"><i class="fa-solid fa-rotate-right mr-2"></i>ทำอีกครั้ง</button>`:''}
      <button class="bs" data-action="toMap"><i class="fa-solid fa-map mr-2"></i>กลับแผนที่</button>
      ${passed&&S.curL<LS.length-1?`<button class="bp" data-action="nextLevel"><i class="fa-solid fa-forward mr-2"></i>บทถัดไป</button>`:''}
      ${passed&&S.curL>=LS.length-1?`<button class="bp" data-action="goComplete"><i class="fa-solid fa-crown mr-2"></i>ดูผลสรุป</button>`:''}
    </div>
  </main>`;
}

/* ================================================================
   หน้าสรุป
   ================================================================ */
function rComp(){
  const cs=getCharStage();
  app.innerHTML=`${tBar()}<main class="max-w-3xl mx-auto px-4 py-8 text-center">
    <div class="afiu"><div class="text-6xl mb-4 afl"><i class="fa-solid fa-crown" style="color:var(--gold);"></i></div>

    <p class="mb-8" style="color:var(--muted);">คุณเรียนครบทั้ง 17 ด่านของ HTML Quest</p></div>
    <div class="gc p-8 mb-6 afiu s1">
      <div class="char-float inline-block mb-4">${getCharSVG(cs.stage,200)}</div>
      <h2 class="text-xl font-bold mb-1" style="color:${CHAR_STAGES[cs.stage].color};">${CHAR_STAGES[cs.stage].name}</h2>
      <p class="text-sm mb-6" style="color:var(--muted);">${CHAR_STAGES[cs.stage].desc}</p>
      <div class="grid grid-cols-3 gap-4">
        <div><div class="text-2xl font-black" style="color:var(--accent);">${S.xp}</div><div class="text-xs" style="color:var(--muted);">XP รวม</div></div>
        <div><div class="text-2xl font-black coin-i">${S.coins}</div><div class="text-xs" style="color:var(--muted);">เหรียญ</div></div>
        <div><div class="text-2xl font-black" style="color:#79c0ff;">${cs.pct}%</div><div class="text-xs" style="color:var(--muted);">คะแนนสอบ</div></div>
      </div>
    </div>
    <div class="gc p-6 mb-6 text-left afiu s2">
      <h3 class="font-bold mb-4">สรุปแต่ละบท</h3>
      <div class="space-y-2">${LS.map(l=>{const sc=S.lScores[l.id];return `<div class="flex items-center gap-3 text-sm p-2 rounded-lg" style="background:var(--card2);"><i class="${l.icon}" style="color:${sc?'var(--accent)':'var(--muted)'};width:20px;text-align:center;"></i><span class="flex-1 truncate">${l.title}</span>${sc?`<span style="color:var(--accent);">${sc.score}/${sc.total}</span>`:'<span style="color:var(--muted);">-</span>'}</div>`;}).join('')}</div>
    </div>
    <button class="bs" data-action="toMap"><i class="fa-solid fa-map mr-2"></i>กลับแผนที่</button>

/* ================================================================
   Overlay วิวัฒนาการตัวละคร
   ================================================================ */
function showEvoOverlay(newStage){
  const old=CHAR_STAGES[newStage-1],nw=CHAR_STAGES[newStage];
  const ov=document.createElement('div');ov.className='evo-overlay';ov.id='evoOv';
  ov.innerHTML=`
    <div class="evo-glow" style="width:300px;height:300px;background:radial-gradient(circle,${nw.color}33,transparent);top:50%;left:50%;transform:translate(-50%,-50%);"></div>
    <div class="text-sm font-bold mb-2" style="color:var(--muted);">วิวัฒนาการตัวละคร!</div>
    <div class="flex items-center gap-8">
      <div class="text-center"><div class="opacity-50">${getCharSVG(newStage-1,100)}</div><div class="text-xs mt-2" style="color:var(--muted);">${old.name}</div></div>
      <div class="text-3xl" style="color:${nw.color};"><i class="fa-solid fa-arrow-right"></i></div>
      <div class="text-center evolve-in"><div>${getCharSVG(newStage,120)}</div><div class="text-xs mt-2 font-bold" style="color:${nw.color};">${nw.name}</div></div>
    </div>
    <div class="text-lg font-bold mt-4" style="color:${nw.color};">${nw.name}</div>
    <div class="text-sm" style="color:var(--muted);">${nw.desc}</div>
    <button class="bp mt-6" onclick="document.getElementById('evoOv').remove()"><i class="fa-solid fa-check mr-2"></i>เยี่ยม!</button>
  `;
  document.body.appendChild(ov);AX.p('evo');conf(60);
}

/* ================================================================
   Editor
   ================================================================ */
function initEd(){
  const ta=document.getElementById('eCode'),ln=document.getElementById('eLn'),fr=document.getElementById('pFrame');
  if(!ta)return;
  function updLn(){const lines=ta.value.split('\n').length;ln.innerHTML=Array.from({length:lines},(_,i)=>i+1).join('<br>');}
  function updPrev(){if(fr){const code=ta.value;try{const doc=new DOMParser().parseFromString(code,'text/html');fr.srcdoc=doc.documentElement.outerHTML;}catch(e){fr.srcdoc=code;}}}
  ta.addEventListener('input',()=>{updLn();updPrev();});
  ta.addEventListener('scroll',()=>{ln.scrollTop=ta.scrollTop;});
  ta.addEventListener('keydown',e=>{if(e.key==='Tab'){e.preventDefault();const s=ta.selectionStart,en=ta.selectionEnd;ta.value=ta.value.substring(0,s)+'  '+ta.value.substring(en);ta.selectionStart=ta.selectionEnd=s+2;updLn();updPrev();}});
  updLn();updPrev();
  /* โหลดค่าเก่าจาก tSession */
  if(S.tSession.results[S.curQ]&&S.tSession.results[S.curQ].code){ta.value=S.tSession.results[S.curQ].code;updLn();updPrev();}
}

/* ================================================================
   Actions — จัดการทุก Event
   ================================================================ */
document.addEventListener('click',e=>{
  const btn=e.target.closest('[data-action]');if(!btn)return;
  const a=btn.dataset.action;
  switch(a){
    case 'authTab':S.authTab=btn.dataset.tab;R();break;
    case 'toggleAdmin':S.adminOpen=!S.adminOpen;R();break;
    case 'doLogin':{const sid=document.getElementById('aSid').value,pw=document.getElementById('aPw').value;const r=loginU(sid,pw);if(r==='ok'||typeof r==='object'){S.user=typeof r==='object'?{...r,role:'user'}:{sid,pw,role:'user',name:sid,room:'-'};loadU(S.user);S.screen='map';R();}else{S.authErr=r;R();}}break;
    case 'doReg':{const n=document.getElementById('rName').value,sid=document.getElementById('rSid').value,rm=document.getElementById('rRoom').value,pw=document.getElementById('rPw').value,pw2=document.getElementById('rPw2').value;if(pw!==pw2){S.authErr='รหัสผ่านไม่ตรงกัน';R();break;}const r=regU(n,sid,rm,pw);if(r==='ok'){S.authErr='';S.authTab='login';toast('สมัครสมาชิกสำเร็จ!','s');R();}else{S.authErr=r;R();}}break;
    case 'doAdmin':{const code=document.getElementById('aAdmin').value;if(code===ADMIN_CODE){S.user={role:'admin',name:'Admin'};S.screen='admin';R();}else{S.authErr='รหัสแอดมินไม่ถูกต้อง';R();}}break;
    case 'logout':saveCur();S.user=null;S.screen='auth';S.xp=0;S.coins=0;S.lScores={};S.pDone={};S.tDone={};R();break;
    case 'selL':{const id=parseInt(btn.dataset.id);S.curL=id-1;S.screen='lesson';R();}break;
    case 'toMap':saveCur();S.screen='map';R();break;
    case 'toLesson':S.screen='lesson';R();break;
    case 'goPrac':S.screen='practice';R();break;
    case 'pHint':{const l=LS[S.curL];l.prac.cks.forEach((_,i)=>{const el=document.getElementById('ht-'+i);if(el)el.style.display='block';});toast('แสดงเคล็ดลับแล้ว','i');}break;
    case 'pReset':{const ta=document.getElementById('eCode');if(ta){ta.value=LS[S.curL].prac.start;ta.dispatchEvent(new Event('input'));}toast('รีเซ็ตโค้ดแล้ว','i');}break;
    case 'pCheck':{if(S.pSubmitted)return;S.pSubmitted=true;const ta=document.getElementById('eCode');if(!ta)break;const code=ta.value;const l=LS[S.curL];const doc=new DOMParser().parseFromString(code,'text/html');let allPass=true;l.prac.cks.forEach((c,i)=>{const el=document.getElementById('ck-'+i);const ht=document.getElementById('ht-'+i);try{const ok=c.ck(doc,code);if(!ok)allPass=false;el.className=`ci ${ok?'pass':'fail'}`;if(ht&&!ok)ht.style.display='block';if(ok)AX.p('cl');}catch(e){allPass=false;el.className='ci fail';}});const wrap=document.getElementById('eWrap');if(wrap)wrap.className=`ew ${allPass?'ok':'err'}`;const res=document.getElementById('pResult');if(allPass){S.pDone[l.id]=true;S.xp+=l.prac.xp;S.coins+=Math.ceil(l.prac.xp/3);S.pAllPass=true;AX.p('ok');toast(`ฝึกพิมพ์สำเร็จ! +${l.prac.xp} XP`,'s');res.innerHTML=`<div class="suc-b"><i class="fa-solid fa-circle-check" style="color:var(--accent);font-size:1.2rem;"></i><div><div class="font-bold">ผ่านทุกเงื่อนไข!</div><div class="text-sm" style="color:var(--muted);">+${l.prac.xp} XP, +${Math.ceil(l.prac.xp/3)} เหรียญ</div></div></div>`;res.style.display='block';saveCur();checkLevelUp();checkCharEvo();}else{AX.p('no');res.innerHTML=`<div class="err-b"><i class="fa-solid fa-circle-xmark" style="color:var(--danger);font-size:1.2rem;"></i><div><div class="font-bold">ยังไม่ผ่าน — ลองอีกครั้ง</div><div class="text-sm" style="color:var(--muted);">ดูเคล็ดลับด้านล่างรายการที่ไม่ผ่าน</div></div></div>`;res.style.display='block';S.pSubmitted=false;}}break;
    case 'skipTest':S.screen='testIntro';R();break;
    case 'startTest':{const l=LS[S.curL];S.curQ=0;S.tSession={results:l.tests.map(t=>({title:t.title,code:t.start,checks:[],passed:0,total:t.cks.length,pass:false})),totalChecks:0,passedChecks:0,xpEarned:0,coinsEarned:0};S.screen='test';R();}break;
    case 'tPrev':{const ta=document.getElementById('eCode');if(ta)S.tSession.results[S.curQ].code=ta.value;if(S.curQ>0){S.curQ--;S.screen='test';R();}}break;
    case 'tNext':{const ta=document.getElementById('eCode');if(ta)S.tSession.results[S.curQ].code=ta.value;if(S.curQ<LS[S.curL].tests.length-1){S.curQ++;S.screen='test';R();}else{finishTest();}}break;
    case 'retake':S.screen='testIntro';R();break;
    case 'nextLevel':{S.curL++;S.screen='lesson';R();}break;
    case 'goComplete':S.screen='complete';R();break;
    case 'exportDB':{const data=exportAllData();const blob=new Blob([data],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='html_quest_data_'+Date.now()+'.json';a.click();URL.revokeObjectURL(url);toast('ส่งออกข้อมูลสำเร็จ','s');}break;
  }
});

function finishTest(){
  const l=LS[S.curL],ts=S.tSession;let totalC=0,passC=0;
  ts.results.forEach((r,i)=>{const t=l.tests[i];const doc=new DOMParser().parseFromString(r.code,'text/html');let p=0;t.cks.forEach(c=>{totalC++;const ok=c.ck(doc,r.code);if(ok){p++;passC++;}});r.passed=p;r.total=t.cks.length;r.pass=p>=Math.ceil(t.cks.length*0.6);});
  ts.totalChecks=totalC;ts.passedChecks=passC;
  const pct=totalC>0?Math.round((passC/totalC)*100):0;
  const passed=pct>=60;
  if(passed){
    const xp=Math.round(l.prac.xp*1.5)+10;const coins=Math.ceil(xp/2);
    ts.xpEarned=xp;ts.coinsEarned=coins;S.xp+=xp;S.coins+=coins;
    /* บันทึกคะแนนสูงสุด */
    const prev=S.lScores[l.id];
    if(!prev||passC>prev.score){
      S.lScores[l.id]={score:passC,total:totalC,completed_at:now()};
    }
    S.tDone[l.id]=true;
    AX.p('win');conf(50);
    logSession(S.user.sid,'test_pass',`บท ${l.id}: ${passC}/${totalC} (${pct}%)`);
  }else{
    logSession(S.user.sid,'test_fail',`บท ${l.id}: ${passC}/${totalC} (${pct}%)`);
  }
  saveCur();checkLevelUp();checkCharEvo();S.screen='testResult';R();
}

function checkLevelUp(){
  const newLi=gLi(S.xp);
  if(newLi>S.prevLvl){AX.p('lv');toast(`เลเวลอัพ! Lv.${newLi+1} ${LVLS[newLi].n}`,'s');S.prevLvl=newLi;}
}

function checkCharEvo(){
  const cs=getCharStage();
  if(cs.stage>S.prevCharStage){setTimeout(()=>showEvoOverlay(cs.stage),600);S.prevCharStage=cs.stage;}
}

/* ================================================================
   เริ่มต้น
   ================================================================ */
initBg();aBg();R();
</script>
