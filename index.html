<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Quest - เกมเรียนรู้ HTML</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root{--bg:#0d1117;--card:#161b22;--card2:#1c2333;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#00ff88;--accent-dim:#00cc6a;--gold:#e3b341;--danger:#ff6b6b;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
        #bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
        #app{position:relative;z-index:1;min-height:100vh;}
        .cf{font-family:'Fira Code',monospace;}
        .xp-outer{background:var(--border);border-radius:999px;height:10px;overflow:hidden;}
        .xp-inner{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));border-radius:999px;transition:width .8s cubic-bezier(.25,1,.5,1);box-shadow:0 0 10px rgba(0,255,136,.4);}
        .gc{background:var(--card);border:1px solid var(--border);border-radius:16px;transition:all .3s ease;}
        .gc:hover{border-color:rgba(0,255,136,.25);}
        .bp{background:linear-gradient(135deg,var(--accent-dim),var(--accent));color:#0d1117;font-weight:700;padding:13px 32px;border-radius:12px;border:none;cursor:pointer;font-size:1rem;font-family:'Kanit',sans-serif;transition:all .3s ease;box-shadow:0 4px 20px rgba(0,255,136,.3);display:inline-flex;align-items:center;justify-content:center;gap:8px;}
        .bp:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(0,255,136,.5);}.bp:active{transform:translateY(0);}.bp:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
        .bs{background:var(--card2);color:var(--text);font-weight:600;padding:11px 24px;border-radius:12px;border:1px solid var(--border);cursor:pointer;font-size:.9rem;font-family:'Kanit',sans-serif;transition:all .3s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
        .bs:hover{border-color:var(--accent);color:var(--accent);}
        .bsm{padding:8px 18px;font-size:.82rem;border-radius:10px;}
        .code-block{background:#0a0e14;border:1px solid var(--border);border-radius:12px;padding:18px;overflow-x:auto;font-family:'Fira Code',monospace;font-size:.8rem;line-height:1.8;tab-size:2;white-space:pre;}
        .code-block .tag{color:#7ee787;}.code-block .attr{color:#79c0ff;}.code-block .val{color:#ffa657;}.code-block .cmt{color:#8b949e;font-style:italic;}.code-block .doctype{color:#8b949e;}
        .pf{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;}
        .pf iframe{width:100%;height:180px;border:none;display:block;}
        .pb{background:var(--card);padding:7px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);}
        .pd{width:10px;height:10px;border-radius:50%;}
        .ew{display:flex;background:#0a0e14;border:2px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .4s,box-shadow .4s;min-height:240px;}
        .ew.ok{border-color:var(--accent);box-shadow:0 0 20px rgba(0,255,136,.15);}
        .ew.err{border-color:var(--danger);box-shadow:0 0 15px rgba(255,107,107,.15);}
        .ln{padding:14px 0;min-width:40px;text-align:right;padding-right:10px;color:#484f58;font-family:'Fira Code',monospace;font-size:.8rem;line-height:1.8;user-select:none;border-right:1px solid var(--border);overflow:hidden;background:#0a0e14;flex-shrink:0;}
        .ce{flex:1;padding:14px;background:transparent;color:var(--text);font-family:'Fira Code',monospace;font-size:.8rem;line-height:1.8;border:none;outline:none;resize:none;tab-size:2;white-space:pre;overflow:auto;min-height:240px;}
        .ce::selection{background:rgba(0,255,136,.2);}
        .ci{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;transition:all .3s;font-size:.88rem;}
        .ci.pass{background:rgba(0,255,136,.08);color:var(--accent);}.ci.fail{background:rgba(255,107,107,.08);color:var(--danger);}.ci.pend{background:var(--card2);color:var(--muted);}
        .ch{font-size:.76rem;color:var(--muted);margin-top:4px;margin-left:30px;padding:6px 10px;background:rgba(227,179,65,.08);border-radius:8px;border-left:3px solid var(--gold);display:none;}.ci.fail .ch{display:block;}
        .mn{position:relative;cursor:pointer;transition:all .3s;}.mn.locked{opacity:.4;cursor:not-allowed;}.mn.locked:hover{opacity:.5;}
        .mn.done .nc{background:var(--accent);border-color:var(--accent);}.mn.cur .nc{border-color:var(--accent);animation:np 2s ease-in-out infinite;}
        .nc{width:50px;height:50px;border-radius:50%;border:3px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .3s;}
        .mc{width:3px;height:36px;margin:0 auto;border-radius:2px;}.mc.d{background:var(--accent);}.mc.p{background:var(--border);}
        .coin-i{color:var(--gold);filter:drop-shadow(0 0 4px rgba(227,179,65,.5));}
        .db{padding:4px 12px;border-radius:999px;font-size:.72rem;font-weight:600;}
        .d-easy{background:rgba(0,255,136,.12);color:var(--accent);}.d-medium{background:rgba(240,136,62,.12);color:#f0883e;}.d-hard{background:rgba(255,107,107,.12);color:var(--danger);}
        .auth-card{max-width:420px;width:100%;}
        .tab-btn{padding:10px 0;flex:1;text-align:center;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;color:var(--muted);}
        .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
        .input-field{width:100%;padding:12px 16px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Kanit',sans-serif;font-size:.95rem;outline:none;transition:border-color .3s;}
        .input-field:focus{border-color:var(--accent);}
        .input-field::placeholder{color:var(--muted);}
        .role-opt{padding:12px 16px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:all .3s;flex:1;text-align:center;}
        .role-opt.sel{border-color:var(--accent);background:rgba(0,255,136,.06);}
        .role-opt:hover{border-color:rgba(0,255,136,.5);}
        .sb{animation:si .4s ease forwards;border-radius:12px;padding:12px 20px;display:flex;align-items:center;gap:10px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.4);pointer-events:auto;}
        .sb.lv{animation:so .3s ease forwards;}
        .sb-s{background:rgba(0,255,136,.15);border:1px solid rgba(0,255,136,.3);color:var(--accent);}.sb-e{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.3);color:var(--danger);}.sb-i{background:rgba(227,179,65,.15);border:1px solid rgba(227,179,65,.3);color:var(--gold);}
        .suc-b{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;}
        .err-b{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:12px;}
        .confetti{position:fixed;width:10px;height:10px;z-index:100;animation:cf linear forwards;pointer-events:none;}
        .lu-ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:90;display:flex;align-items:center;justify-content:center;animation:fi .3s ease;}.lu-c{text-align:center;animation:sc .5s ease;}
        @keyframes np{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.4);}50%{box-shadow:0 0 0 12px rgba(0,255,136,0);}}
        @keyframes fiu{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fi{from{opacity:0;}to{opacity:1;}}
        @keyframes sd{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
        @keyframes gl{0%,100%{text-shadow:0 0 20px rgba(0,255,136,.3);}50%{text-shadow:0 0 40px rgba(0,255,136,.6),0 0 80px rgba(0,255,136,.2);}}
        @keyframes sc{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
        @keyframes cf{0%{transform:translateY(-100vh) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
        @keyframes si{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
        @keyframes so{from{transform:translateX(0);opacity:1;}to{transform:translateX(100%);opacity:0;}}
        @keyframes sh{0%,100%{transform:translateX(0);}20%{transform:translateX(-6px);}40%{transform:translateX(6px);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}}
        .afiu{animation:fiu .6s ease forwards;}.afi{animation:fi .5s ease forwards;}.asd{animation:sd .4s ease forwards;}.afl{animation:fl 3s ease-in-out infinite;}.agl{animation:gl 3s ease-in-out infinite;}
        .s1{animation-delay:.1s;opacity:0;}.s2{animation-delay:.2s;opacity:0;}.s3{animation-delay:.3s;opacity:0;}.s4{animation-delay:.4s;opacity:0;}.s5{animation-delay:.5s;opacity:0;}
        ::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
        @media(max-width:768px){.code-block,.ce,.ln{font-size:.7rem;}.nc{width:42px;height:42px;font-size:.95rem;}.mc{height:28px;}.ew,.ce{min-height:180px;}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
    </style>
</head>
<body>
    <canvas id="bgCanvas" aria-hidden="true"></canvas>
    <div id="app" role="main"></div>
    <div id="tc" style="position:fixed;top:20px;right:20px;z-index:80;display:flex;flex-direction:column;gap:10px;pointer-events:none;"></div>
    <div id="oc"></div>
<script>
/* ================================================================
   ข้อมูลบทเรียน แบบฝึกพิมพ์ และแบบทดสอบเขียนโค้ด
   ================================================================ */
const L=[
{id:1,title:'โครงสร้างพื้นฐาน HTML',icon:'fa-solid fa-house-chimney',
desc:'เรียนรู้โครงสร้างหลักของเอกสาร HTML',
pts:['ทุกเอกสาร HTML เริ่มด้วย <code class="cf" style="color:#7ee787;">&lt;!DOCTYPE html&gt;</code>','<code class="cf" style="color:#7ee787;">&lt;html&gt;</code> เป็นภาชนะหลักครอบทุกอย่าง','<code class="cf" style="color:#7ee787;">&lt;head&gt;</code> ใส่ข้อมูลเมตา เช่น <code class="cf" style="color:#7ee787;">&lt;title&gt;</code>','<code class="cf" style="color:#7ee787;">&lt;body&gt;</code> ใส่เนื้อหาที่แสดงบนหน้าจอ'],
code:'<!DOCTYPE html>\n<html>\n  <head>\n    <title>หน้าเว็บแรก</title>\n  </head>\n  <body>\n    <h1>สวัสดีชาวโลก!</h1>\n    <p>นี่คือเว็บแรกของฉัน</p>\n  </body>\n</html>',
prac:{title:'สร้างหน้าเว็บพื้นฐาน',desc:'เติมโค้ดใน body ให้มี h1 และ p',
start:'<!DOCTYPE html>\n<html>\n  <head>\n    <title>แบบฝึกหัด</title>\n  </head>\n  <body>\n    \n  </body>\n</html>',
cks:[{lb:'มีแท็ก <h1>',ck:d=>!!d.querySelector('h1'),ht:'เขียน <h1>หัวข้อ</h1>'},{lb:'มีแท็ก <p>',ck:d=>!!d.querySelector('p'),ht:'เขียน <p>ข้อความ</p>'}],
xp:15,gh:'เนื้อหาที่แสดงบนหน้าเว็บต้องอยู่ภายใต้ <body>'},
tests:[
{title:'สร้างหน้าเว็บมีชื่อ',desc:'สร้างหน้าเว็บที่มี title เป็น "เว็บของฉัน" และมี h1 ข้างใน body',
start:'<!DOCTYPE html>\n<html>\n  <head>\n    <title></title>\n  </head>\n  <body>\n    \n  </body>\n</html>',
cks:[{lb:'title เป็น "เว็บของฉัน"',ck:(d,c)=>/<title>\s*เว็บของฉัน\s*<\/title>/i.test(c)},{lb:'มีแท็ก <h1>',ck:d=>!!d.querySelector('h1')}]},
{title:'เพิ่มย่อหน้าข้อความ',desc:'สร้างหน้าเว็บที่มีแท็ก p พร้อมข้อความอะไรก็ได้',
start:'<!DOCTYPE html>\n<html>\n  <head>\n    <title>ทดสอบ</title>\n  </head>\n  <body>\n    \n  </body>\n</html>',
cks:[{lb:'มีแท็ก <p>',ck:d=>!!d.querySelector('p')},{lb:'<p> มีข้อความ',ck:d=>{const p=d.querySelector('p');return p&&p.textContent.trim().length>0;}}]},
{title:'สร้างหน้าเว็บครบถ้วน',desc:'สร้างหน้าเว็บที่มีทั้ง h1, p และ DOCTYPE ถูกต้อง',
start:'',
cks:[{lb:'มี DOCTYPE html',ck:(d,c)=>/<!DOCTYPE\s+html>/i.test(c)},{lb:'มี <h1>',ck:d=>!!d.querySelector('h1')},{lb:'มี <p>',ck:d=>!!d.querySelector('p')}]}
]},
{id:2,title:'หัวข้อและย่อหน้า',icon:'fa-solid fa-heading',
desc:'เรียนรู้การสร้างหัวข้อ h1-h6 และย่อหน้า',
pts:['<code class="cf" style="color:#7ee787;">&lt;h1&gt;</code> ถึง <code class="cf" style="color:#7ee787;">&lt;h6&gt;</code> สร้างหัวข้อ h1 ใหญ่สุด','<code class="cf" style="color:#7ee787;">&lt;p&gt;</code> สร้างย่อหน้า','<code class="cf" style="color:#7ee787;">&lt;hr&gt;</code> สร้างเส้นแบ่ง','<code class="cf" style="color:#7ee787;">&lt;br&gt;</code> ขึ้นบรรทัดใหม่'],
code:'<h1>หัวข้อ h1</h1>\n<h2>หัวข้อ h2</h2>\n<h3>หัวข้อ h3</h3>\n<p>นี่คือย่อหน้า</p>\n<hr>\n<p>อีกย่อหน้าหนึ่ง</p>',
prac:{title:'สร้างหัวข้อและย่อหน้า',desc:'สร้าง h1, h2 และ p',
start:'<!DOCTYPE html>\n<html>\n  <head><title>ฝึกหัด</title></head>\n  <body>\n    \n  </body>\n</html>',
cks:[{lb:'มี <h1>',ck:d=>!!d.querySelector('h1')},{lb:'มี <h2>',ck:d=>!!d.querySelector('h2')},{lb:'มี <p>',ck:d=>!!d.querySelector('p')}],xp:20,gh:'h1 ใหญ่สุด, h2 รองลงมา, p คือย่อหน้า'},
tests:[
{title:'สร้างหัวข้อ 2 ระดับ',desc:'สร้างหน้าเว็บที่มีทั้ง h1 และ h3',
start:'<!DOCTYPE html>\n<html>\n  <head><title>ทดสอบ</title></head>\n  <body>\n    \n  </body>\n</html>',
cks:[{lb:'มี <h1>',ck:d=>!!d.querySelector('h1')},{lb:'มี <h3>',ck:d=>!!d.querySelector('h3')}]},
{title:'ใช้เส้นแบ่ง',desc:'สร้างหน้าเว็บที่มี p อย่างน้อย 2 อัน คั่นด้วย hr',
start:'<!DOCTYPE html>\n<html>\n  <head><title>ทดสอบ</title></head>\n  <body>\n    \n  </body>\n</html>',
cks:[{lb:'มี <p> อย่างน้อย 2 อัน',ck:d=>d.querySelectorAll('p').length>=2},{lb:'มี <hr>',ck:d=>!!d.querySelector('hr')}]},
{title:'สร้างลำดับหัวข้อ',desc:'สร้าง h1, h2, h3 เรียงกันในหน้าเดียว',
start:'<!DOCTYPE html>\n<html>\n  <head><title>ทดสอบ</title></head>\n  <body>\n    \n  </body>\n</html>',
cks:[{lb:'มี <h1>',ck:d=>!!d.querySelector('h1')},{lb:'มี <h2>',ck:d=>!!d.querySelector('h2')},{lb:'มี <h3>',ck:d=>!!d.querySelector('h3')}]}
]},
{id:3,title:'จัดรูปแบบข้อความ',icon:'fa-solid fa-font',
desc:'เรียนรู้แท็ก strong, em, u, mark',
pts:['<code class="cf" style="color:#7ee787;">&lt;strong&gt;</code> ตัวหนา (สำคัญ)','<code class="cf" style="color:#7ee787;">&lt;em&gt;</code> ตัวเอียง (เน้น)','<code class="cf" style="color:#7ee787;">&lt;u&gt;</code> ขีดเส้นใต้','<code class="cf" style="color:#7ee787;">&lt;mark&gt;</code> ไฮไลท์'],
code:'<p>ข้อความ <strong>ตัวหนา</strong></p>\n<p>ข้อความ <em>ตัวเอียง</em></p>\n<p>ข้อความ <u>ขีดเส้นใต้</u></p>\n<p>ข้อความ <mark>ไฮไลท์</mark></p>',
prac:{title:'จัดรูปแบบข้อความ',desc:'ใช้ strong, em, mark ในย่อหน้า',
start:'<!DOCTYPE html>\n<html>\n  <head><title>ฝึกหัด</title></head>\n  <body>\n    <p>ข้อความที่ยังไม่จัดรูปแบบ</p>\n  </body>\n</html>',
cks:[{lb:'มี <strong>',ck:d=>!!d.querySelector('strong')},{lb:'มี <em>',ck:d=>!!d.querySelector('em')},{lb:'มี <mark>',ck:d=>!!d.querySelector('mark')}],xp:25,gh:'ครอบข้อความด้วยแท็ก เช่น <strong>ตัวหนา</strong>'},
tests:[
{title:'ใช้ตัวหนาและเอียง',desc:'สร้าง p ที่มีทั้ง strong และ em',
start:'<!DOCTYPE html>\n<html>\n  <head><title>ทดสอบ</title></head>\n  <body>\n    \n  </body>\n</html>',

{title:'ใช้ขีดเส้นใต้และไฮไลท์',desc:'สร้างข้อความที่มีทั้ง u และ mark',
start:'<!DOCTYPE html>\n<html>\n  <head><title>ทดสอบ</title></head>\n  <body>\n    \n  </body>\n</html>',
cks:[{lb:'มี <u>',ck:d=>!!d.querySelector('u')},{lb:'มี <mark>',ck:d=>!!d.querySelector('mark')}]},
{title:'ใช้ครบทั้ง 4 แท็ก',desc:'สร้างข้อความที่ใช้ strong, em, u และ mark ครบทุกตัว',
start:'<!DOCTYPE html>\n<html>\n  <head><title>ทดสอบ</title></head>\n  <body>\n    \n  </body>\n</html>',
cks:[{lb:'มี <strong>',ck:d=>!!d.querySelector('strong')},{lb:'มี <em>',ck:d=>!!d.querySelector('em')},{lb:'มี <u>',ck:d=>!!d.querySelector('u')},{lb:'มี <mark>',ck:d=>!!d.querySelector('mark')}]}
]},
{id:4,title:'ลิงก์และรูปภาพ',icon:'fa-solid fa-link',
desc:'เรียนรู้การสร้างลิงก์และแสดงรูปภาพ',
pts:['<code class="cf" style="color:#7ee787;">&lt;a href="URL"&gt;</code> สร้างลิงก์','<code class="cf" style="color:#7ee787;">&lt;img src="URL" alt="..."&gt;</code> แสดงรูป','attribute <code class="cf" style="color:#ffa657;">alt</code> สำคัญต่อการเข้าถึง','<code class="cf" style="color:#ffa657;">target="_blank"</code> เปิดแท็บใหม่'],
code:'<a href="https://example.com">คลิกที่นี่</a>\n<br><br>\n<img src="https://picsum.photos/seed/hq/300/150" alt="รูปตัวอย่าง">',

const bgC=document.getElementById('bgCanvas'),bgX=bgC.getContext('2d');let bgS=[];
function initBg(){bgC.width=innerWidth;bgC.height=innerHeight;bgS=[];
const sy=['<','>','/','=','"','}','{',';','#','</>','<div>','<p>','<h1>'];
const cn=Math.floor((bgC.width*bgC.height)/30000);
for(let i=0;i<cn;i++)bgS.push({x:Math.random()*bgC.width,y:Math.random()*bgC.height,s:sy[Math.floor(Math.random()*sy.length)],sz:10+Math.random()*13,sp:.1+Math.random()*.25,op:.03+Math.random()*.06,dr:(Math.random()-.5)*.2});}
function aBg(){bgX.clearRect(0,0,bgC.width,bgC.height);bgS.forEach(s=>{s.y-=s.sp;s.x+=s.dr;if(s.y<-30){s.y=bgC.height+30;s.x=Math.random()*bgC.width;}if(s.x<-30)s.x=bgC.width+30;if(s.x>bgC.width+30)s.x=-30;bgX.font=`${s.sz}px "Fira Code",monospace`;bgX.fillStyle=`rgba(0,255,136,${s.op})`;bgX.fillText(s.s,s.x,s.y);});requestAnimationFrame(aBg);}
addEventListener('resize',()=>{bgC.width=innerWidth;bgC.height=innerHeight;});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hlC(c){let h=esc(c);h=h.replace(/(&lt;!--[\s\S]*?--&gt;)/g,'<span class="cmt">$1</span>');h=h.replace(/(&lt;!DOCTYPE\s+html&gt;)/gi,'<span class="doctype">$1</span>');h=h.replace(/(&lt;\/?)([\w-]+)/g,'$1<span class="tag">$2</span>');h=h.replace(/([\w-]+)(=)(&quot;)(.*?)(&quot;)/g,'<span class="attr">$1</span>$2<span class="val">$3$4$5</span>');return h;}
function gLv(xp){let l=LVLS[0];for(const v of LVLS)if(xp>=v.m)l=v;return l;}
function gLi(xp){let i=0;for(let j=0;j<LVLS.length;j++)if(xp>=LVLS[j].m)i=j;return i;}
function gNx(xp){const i=gLi(xp);return i>=LVLS.length-1?LVLS[i].m:LVLS[i+1].m;}
function gCx(xp){return LVLS[gLi(xp)].m;}
function gSt(id){return S.lScores[id]?'done':(id===1||S.lScores[id-1]?'cur':'locked');}
function allDone(){return L.every(l=>S.lScores[l.id]);}
function gBody(c){const m=c.match(/<body[^>]*>([\s\S]*?)<\/body>/i);return m?m[1]:c;}
function toast(m,t='s'){const c=document.getElementById('tc');const d=document.createElement('div');d.className=`sb sb-${t}`;const ic={s:'fa-circle-check',e:'fa-circle-xmark',i:'fa-circle-info'};d.innerHTML=`<i class="fa-solid ${ic[t]||ic.i}"></i><span>${m}</span>`;c.appendChild(d);setTimeout(()=>d.classList.add('lv'),2500);setTimeout(()=>d.remove(),2900);}
function conf(n=40){const cs=['#00ff88','#e3b341','#ff6b6b','#79c0ff','#ffa657','#d2a8ff'];for(let i=0;i<n;i++){const p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=cs[Math.floor(Math.random()*cs.length)];p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.animationDuration=(2+Math.random()*3)+'s';p.style.animationDelay=Math.random()*1.2+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),5500);}}

   ================================================================ */
function getUsers(){try{return JSON.parse(localStorage.getItem('hq_users'))||[];}catch(e){return[];}}
function saveUsers(u){localStorage.setItem('hq_users',JSON.stringify(u));}
function getUser(name){return getUsers().find(u=>u.username===name);}
function regUser(name,pw,role){
    if(getUser(name))return'ชื่อผู้ใช้นี้มีอยู่แล้ว';
    if(name.length<2)return'ชื่อผู้ใช้ต้องมีอย่างน้อย 2 ตัวอักษร';
    if(pw.length<3)return'รหัสผ่านต้องมีอย่างน้อย 3 ตัวอักษร';
    const users=getUsers();users.push({username:name,password:pw,role,xp:0,coins:0,lScores:{},pDone:{},tDone:{},maxStreak:0});saveUsers(users);return'ok';
}
function loginUser(name,pw){
    const u=getUser(name);if(!u)return'ไม่พบชื่อผู้ใช้นี้';
    if(u.password!==pw)return'รหัสผ่านไม่ถูกต้อง';return u;
}
function saveCurUser(){
    if(!S.user)return;const users=getUsers();
    const i=users.findIndex(u=>u.username===S.user.username);
    if(i>=0){users[i]={...users[i],xp:S.xp,coins:S.coins,lScores:S.lScores,pDone:S.pDone,tDone:S.tDone,maxStreak:S.maxStreak};saveUsers(users);}
}
function loadUserData(u){S.xp=u.xp||0;S.coins=u.coins||0;S.lScores=u.lScores||{};S.pDone=u.pDone||{};S.tDone=u.tDone||{};S.maxStreak=u.maxStreak||0;S.prevLvl=gLi(S.xp);}

        <div class="gc p-8 mb-8 afiu s1" style="animation:sc .6s ease;">
            <div class="grid grid-cols-3 gap-4 mb-8">
                <div class="p-4 rounded-xl" style="background:var(--card2);"><i class="fa-solid fa-star text-xl mb-2" style="color:var(--accent);"></i><div class="text-2xl font-bold">${S.xp}</div><div class="text-xs" style="color:var(--muted);">XP</div></div>
                <div class="p-4 rounded-xl" style="background:var(--card2);"><i class="fa-solid fa-coins text-xl mb-2 coin-i"></i><div class="text-2xl font-bold">${S.coins}</div><div class="text-xs" style="color:var(--muted);">เหรียญ</div></div>
                <div class="p-4 rounded-xl" style="background:var(--card2);"><i class="fa-solid ${LVLS[li].i} text-xl mb-2" style="color:var(--gold);"></i><div class="text-2xl font-bold">Lv.${li+1}</div><div class="text-xs" style="color:var(--muted);">${LVLS[li].n}</div></div>
            </div>
            <div class="space-y-2 text-left">${L.map(l=>{const sc=S.lScores[l.id];return `<div class="flex items-center gap-3 p-3 rounded-lg" style="background:var(--card2);"><i class="${l.icon}" style="color:var(--accent);width:20px;text-align:center;"></i><span class="flex-1 text-sm text-left">${l.title}</span><span class="text-sm font-bold" style="color:sc?'var(--accent)':'var(--danger)';">${sc?sc.score+'/'+sc.total:'-'}</span></div>`;}).join('')}</div>
        </div>
        <div class="flex gap-3 justify-center afiu s2"><button class="bs" data-action="toMap"><i class="fa-solid fa-map mr-2"></i>ดูแผนที่</button></div>
    </main>`;
    conf(80);
}

/* ================================================================
   ระบบเอดิเตอร์
   ================================================================ */
let eTimer=null;
function initEd(){
    const ed=document.getElementById('eCode'),ln=document.getElementById('eLn'),pf=document.getElementById('pFrame');
    if(!ed)return;
    ed.addEventListener('keydown',e=>{
        if(e.key==='Tab'){e.preventDefault();const s=ed.selectionStart,en=ed.selectionEnd;ed.value=ed.value.substring(0,s)+'  '+ed.value.substring(en);ed.selectionStart=ed.selectionEnd=s+2;onEdIn();}
        if(e.key==='Enter'){e.preventDefault();const s=ed.selectionStart;const ls=ed.value.lastIndexOf('\n',s-1)+1;const indent=ed.value.substring(ls,s).match(/^\s*/)[0];const nl='\n'+indent;ed.value=ed.value.substring(0,s)+nl+ed.value.substring(ed.selectionEnd);ed.selectionStart=ed.selectionEnd=s+nl.length;onEdIn();}
    });
    ed.addEventListener('input',()=>{onEdIn();clearTimeout(eTimer);eTimer=setTimeout(updCk,300);});
    ed.addEventListener('scroll',()=>{if(ln)ln.scrollTop=ed.scrollTop;});
    upLn();upPf();
    setTimeout(updCk,100);
}
function onEdIn(){upLn();upPf();}
function upLn(){const ed=document.getElementById('eCode'),ln=document.getElementById('eLn');if(!ed||!ln)return;ln.innerHTML=Array.from({length:ed.value.split('\n').length},(_,i)=>i+1).join('<br>');}
function upPf(){const ed=document.getElementById('eCode'),pf=document.getElementById('pFrame');if(ed&&pf)pf.srcdoc=ed.value;}
function updCk(){
    const ed=document.getElementById('eCode');if(!ed||S.screen!=='practice')return;
    const c=ed.value,body=gBody(c),tmp=document.createElement('div');tmp.innerHTML=body;
    const cks=L[S.curL].prac.cks;let allOk=true;
    cks.forEach((ck,i)=>{
        const el=document.getElementById(`ck-${i}`),ht=document.getElementById(`ht-${i}`);if(!el)return;
        const ok=ck.ck(tmp,c);if(!ok)allOk=false;
        el.className=`ci ${ok?'pass':'pend'}`;
        el.querySelector('span:first-child').innerHTML=`<i class="fa-solid ${ok?'fa-circle-check':'fa-circle'}" style="font-size:${ok?'.85rem':'.6rem'};"></i>`;
        if(ht&&!S.pSubmitted)ht.style.display='none';
    });
    const w=document.getElementById('eWrap');if(w){w.classList.toggle('ok',allOk&&!S.pSubmitted);w.classList.remove('err');}
    S.pAllPass=allOk;
}
function submitPrac(){
    const ed=document.getElementById('eCode');if(!ed)return;
    const c=ed.value,body=gBody(c),tmp=document.createElement('div');tmp.innerHTML=body;
    const cks=L[S.curL].prac.cks;let pc=0;
    cks.forEach((ck,i)=>{
        const el=document.getElementById(`ck-${i}`),ht=document.getElementById(`ht-${i}`);
        const ok=ck.ck(tmp,c);if(ok)pc++;
        el.className=`ci ${ok?'pass':'fail'}`;
        el.querySelector('span:first-child').innerHTML=`<i class="fa-solid ${ok?'fa-circle-check':'fa-circle-xmark'}" style="font-size:.85rem;"></i>`;
        if(ht&&!ok)ht.style.display='block';if(ht&&ok)ht.style.display='none';
    });
    const w=document.getElementById('eWrap'),allOk=pc===cks.length;
    const rd=document.getElementById('pResult');rd.style.display='block';
    if(allOk){
        w.classList.add('ok');w.classList.remove('err');AX.p('win');
        let xg=0;if(!S.pDone[L[S.curL].id]){S.pDone[L[S.curL].id]=true;xg=L[S.curL].prac.xp;S.xp+=xg;AX.p('co');chkLv();saveCurUser();upTb();}
        rd.innerHTML=`<div class="suc-b"><i class="fa-solid fa-circle-check text-2xl" style="color:var(--accent);"></i><div><div class="font-bold" style="color:var(--accent);">ผ่านทุกข้อ!</div><div class="text-sm" style="color:var(--muted);">${xg>0?`+${xg} XP`:'ได้รับ XP แล้ว'}</div></div></div><div class="text-center mt-4"><button class="bp" data-action="goTestIntro"><i class="fa-solid fa-pen-to-square mr-2"></i>ไปทดสอบ</button></div>`;
        if(xg>0){conf(25);toast(`+${xg} XP จากการฝึกพิมพ์!`,'s');}
        const btn=document.getElementById('pChkBtn');if(btn)btn.style.display='none';
    } else {
        w.classList.add('err');w.classList.remove('ok');AX.p('no');
        rd.innerHTML=`<div class="err-b"><i class="fa-solid fa-circle-xmark text-2xl" style="color:var(--danger);"></i><div><div class="font-bold" style="color:var(--danger);">ยังไม่ครบ (${pc}/${cks.length})</div><div class="text-sm" style="color:var(--muted);">ดูเคล็ดลับแล้วแก้ไข</div></div></div>`;
        toast(`ผ่าน ${pc}/${cks.length}`,'e');
    }
    S.pSubmitted=true;
}

/* ================================================================
   อัปเดตแถบด้านบน Real-time
   ================================================================ */
function upTb(){
    const lv=gLv(S.xp),li=gLi(S.xp),cx=gCx(S.xp),nx=gNx(S.xp);
    const pct=nx>cx?((S.xp-cx)/(nx-cx))*100:100;
    const h=document.querySelector('header');if(!h)return;
    const bar=h.querySelector('.xp-inner');if(bar)bar.style.width=Math.min(pct,100)+'%';
    const sp=h.querySelectorAll('.text-xs');if(sp.length>=2){sp[0].textContent=S.xp+' XP';sp[1].textContent=nx>cx?nx+' XP':'MAX';}
    h.querySelectorAll('span').forEach(s=>{if(s.innerHTML.includes('fa-star'))s.innerHTML=`<i class="fa-solid fa-star"></i> ${S.xp}`;if(s.innerHTML.includes('fa-coins'))s.innerHTML=`<i class="fa-solid fa-coins"></i> ${S.coins}`;});
    const ls=h.querySelector('span.flex.items-center.gap-2.text-sm');if(ls)ls.innerHTML=`<i class="${lv.i}"></i> Lv.${li+1} ${lv.n}`;
    let se=h.querySelector('[style*="color:#ff6b6b"]');
    if(S.streak>1&&!se){const sd=h.querySelector('.flex.items-center.gap-4');if(sd){const sp=document.createElement('span');sp.className='flex items-center gap-1';sp.style.color='#ff6b6b';sp.innerHTML=`<i class="fa-solid fa-fire"></i> ${S.streak}x`;sd.insertBefore(sp,sd.firstChild);}}
    else if(se){if(S.streak>1)se.innerHTML=`<i class="fa-solid fa-fire"></i> ${S.streak}x`;else se.remove();}
}
function chkLv(){const n=gLi(S.xp);if(n>S.prevLvl){S.prevLvl=n;setTimeout(()=>showLv(n),600);}}
function showLv(li){
    const lv=LVLS[li];AX.p('lv');const ov=document.getElementById('oc');
    ov.innerHTML=`<div class="lu-ov" id="lvOv"><div class="lu-c"><div class="text-5xl mb-4 afl"><i class="${lv.i}" style="color:var(--gold);filter:drop-shadow(0 0 20px rgba(227,179,65,.6));"></i></div><div class="text-sm font-semibold mb-2" style="color:var(--gold);">LEVEL UP!</div><div class="text-3xl font-black mb-2" style="color:var(--accent);">Level ${li+1}</div><div class="text-xl font-semibold mb-6">${lv.n}</div><div class="text-sm" style="color:var(--muted);">คลิกเพื่อดำเนินการต่อ</div></div></div>`;
    conf(45);document.getElementById('lvOv').addEventListener('click',()=>{ov.innerHTML='';});
}

/* ================================================================
   จัดการ Event
   ================================================================ */
app.addEventListener('click',e=>{
    const b=e.target.closest('[data-action]');if(!b)return;
    const a=b.dataset.action;AX.p('cl');
    const cl=()=>L[S.curL];

    switch(a){
    case 'authTab':S.authTab=b.dataset.tab;S.authErr='';R();break;
    case 'setRole':S._role=b.dataset.role;R();break;
    case 'doLogin':{
        const u=document.getElementById('authUser').value.trim();
        const p=document.getElementById('authPw').value;
        const r=loginUser(u,p);
        if(r==='ok'){}else if(typeof r==='string'){S.authErr=r;R();}
        else{S.user={username:r.username,role:r.role};loadUserData(r);S.screen=r.role==='admin'?'admin':'map';R();}
        break;}
    case 'doRegister':{
        const u=document.getElementById('authUser').value.trim();
        const p=document.getElementById('authPw').value;
        const p2=document.getElementById('authPw2').value;
        if(p!==p2){S.authErr='รหัสผ่านไม่ตรงกัน';R();break;}
        const r=regUser(u,p,S._role||'student');
        if(r==='ok'){S.authErr='';S.authTab='login';toast('สมัครสมาชิกสำเร็จ! กรุณาเข้าสู่ระบบ','s');R();}
        else{S.authErr=r;R();}
        break;}
    case 'logout':saveCurUser();S.user=null;S.screen='auth';S._role='student';R();break;
    case 'toMap':S.screen=allDone()?'complete':'map';R();break;
    case 'toLesson':S.screen='lesson';R();break;
    case 'selL':{const id=parseInt(b.dataset.id);if(gSt(id)==='locked')return;S.curL=id-1;S.screen='lesson';R();break;}
    case 'goPrac':S.screen='practice';R();break;
    case 'skipTest':case 'goTestIntro':S.screen='testIntro';R();break;
    case 'pHint':{
        const ch=cl().prac;const rd=document.getElementById('pResult');rd.style.display='block';
        rd.innerHTML=`<div class="gc p-4 afi" style="border-color:rgba(227,179,65,.3);"><div class="flex items-center gap-2 mb-2"><i class="fa-solid fa-lightbulb" style="color:var(--gold);"></i><span class="font-semibold text-sm" style="color:var(--gold);">เคล็ดลับ</span></div><p class="text-sm" style="color:var(--muted);">${ch.gh}</p></div>`;
        ch.cks.forEach((c,i)=>{const el=document.getElementById(`ck-${i}`),ht=document.getElementById(`ht-${i}`);if(el&&!el.classList.contains('pass')&&ht)ht.style.display='block';});
        break;}
    case 'pReset':{
        const ed=document.getElementById('eCode');if(ed){ed.value=cl().prac.start;onEdIn();clearTimeout(eTimer);eTimer=setTimeout(updCk,200);}
        cl().prac.cks.forEach((_,i)=>{const el=document.getElementById(`ck-${i}`),ht=document.getElementById(`ht-${i}`);if(el){el.className='ci pend';el.querySelector('span:first-child').innerHTML='<i class="fa-solid fa-circle" style="font-size:.6rem;"></i>';}if(ht)ht.style.display='none';});
        const w=document.getElementById('eWrap');if(w)w.classList.remove('ok','err');
        const rd=document.getElementById('pResult');if(rd)rd.style.display='none';
        const cb=document.getElementById('pChkBtn');if(cb)cb.style.display='';
        S.pSubmitted=false;S.pAllPass=false;break;}
    case 'pCheck':submitPrac();break;
    case 'startTest':
        S.curQ=0;S.streak=0;
        S.tSession={results:[],totalChecks:0,passedChecks:0,xpEarned:0,coinsEarned:0};
        S.screen='test';R();break;
    case 'submitTestQ':{
        const ed=document.getElementById('eCode');if(!ed)break;
        const code=ed.value,body=gBody(code),tmp=document.createElement('div');tmp.innerHTML=body;
        const t=cl().tests[S.curQ];
        let passed=0;const details=[];
        t.cks.forEach(ck=>{const ok=ck.ck(tmp,code);if(ok)passed++;details.push({label:ck.lb,ok});});
        S.tSession.results.push({passed,total:t.cks.length,details});
        S.tSession.totalChecks+=t.cks.length;
        S.tSession.passedChecks+=passed;

        if(S.curQ<cl().tests.length-1){
            S.curQ++;S.screen='test';R();
        } else {
            // คำนวณคะแนนรวม
            const ts=S.tSession;
            const pct=ts.totalChecks>0?(ts.passedChecks/ts.totalChecks)*100:0;
            const passedOverall=pct>=60;
            let xg=0,cg=0;
            if(passedOverall){
                xg=ts.passedChecks*5;cg=ts.passedChecks;
                if(!S.tDone[cl().id]){
                    S.tDone[cl().id]=true;S.xp+=xg;S.coins+=cg;AX.p('co');
                    S.streak++;if(S.streak>S.maxStreak)S.maxStreak=S.streak;
                    chkLv();
                    // บันทึกคะแนนบท
                    const ex=S.lScores[cl().id];
                    if(!ex||ts.passedChecks>ex.score)S.lScores[cl().id]={score:ts.passedChecks,total:ts.totalChecks};
                }
                ts.xpEarned=xg;ts.coinsEarned=cg;
            } else {
                S.streak=0;
            }
            saveCurUser();upTb();S.screen='testResult';R();
        }
        break;}
    case 'retryTest':
        S.curQ=0;S.tSession={results:[],totalChecks:0,passedChecks:0,xpEarned:0,coinsEarned:0};
        S.screen='test';R();break;
    }
});

// กด Enter ในฟอร์ม Auth
app.addEventListener('keydown',e=>{
    if(e.key==='Enter'&&S.screen==='auth'){
        const pw2=document.getElementById('authPw2');
        if(pw2)document.querySelector('[data-action="doRegister"]')?.click();
        else document.querySelector('[data-action="doLogin"]')?.click();
    }
});

/* ================================================================
   เริ่มต้น
   ================================================================ */
S._role='student';
initBg();aBg();R();
</script>
