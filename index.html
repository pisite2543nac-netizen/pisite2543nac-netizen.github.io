<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการคะแนนแยกห้องและอนุมัติออนไลน์</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #34495e; --success: #27ae60; --danger: #e74c3c; --warning: #f39c12; --info: #3498db; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }
        
        /* Header & Navigation */
        header { background: var(--primary); color: white; padding: 1rem 2rem; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; margin-left: 10px; }
        .bg-pending { background: var(--warning); color: white; }
        .bg-approved { background: var(--success); color: white; }

        /* Card Styles */
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; border-bottom: 1px solid #ddd; padding-bottom: 10px; }
        .tab-btn { padding: 10px 20px; cursor: pointer; border: none; background: none; font-weight: bold; color: #7f8c8d; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* Form Elements */
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; margin-top: 5px; }
        label { font-size: 13px; font-weight: bold; color: #555; }
        .btn { padding: 10px 15px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-main { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }

        /* Table */
        .table-res { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; }
        .room-tag { background: #eee; padding: 2px 6px; border-radius: 3px; font-size: 11px; }

        /* Auth Screen */
        .auth-box { max-width: 450px; margin: 80px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <!-- AUTH SCREEN -->
    <div id="authPanel" class="auth-box">
        <h2 style="text-align: center; margin-bottom: 20px;">🎓 ระบบบันทึกคะแนน</h2>
        <div class="tabs">
            <button class="tab-btn active" onclick="setAuthMode('login')">เข้าสู่ระบบ</button>
            <button class="tab-btn" onclick="setAuthMode('reg')">ลงทะเบียนนศ.</button>
        </div>

        <div id="loginForm">
            <label>รหัสนักศึกษา </label>
            <input type="text" id="loginId" placeholder="เลขทะเบียนนักศึกษา">
            <button class="btn btn-main" style="width: 100%; margin-top: 20px;" onclick="handleLogin()">ยืนยัน</button>
        </div>

        <div id="regForm" class="hidden">
            <label>รหัสนักศึกษา</label>
            <input type="text" id="regId" placeholder="เช่น 66xxxxx">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="regName">
            <label>เลือกห้องเรียน</label>
            <select id="regRoom">
                <option value="1">ห้องเรียน 1</option>
                <option value="2">ห้องเรียน 2</option>
                <option value="3">ห้องเรียน 3</option>
                <option value="4">ห้องเรียน 4</option>
                <option value="5">ห้องเรียน 5</option>
            </select>
            <button class="btn btn-success" style="width: 100%; margin-top: 20px;" onclick="handleRegister()">ลงทะเบียนขอเข้าใช้งาน</button>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="mainPanel" class="hidden">
        <header>
            <div id="userInfo"></div>
            <button class="btn btn-danger" onclick="location.reload()">ออกจากระบบ</button>
        </header>

        <!-- TEACHER AREA -->
        <div id="teacherArea" class="hidden">
            <div class="tabs">
                <button class="tab-btn active" onclick="showTeacherTab('score')">📊 จัดการคะแนน</button>
                <button class="tab-btn" onclick="showTeacherTab('approve')">🔔 อนุมัตินักศึกษา <span id="pendingCount" class="badge bg-pending">0</span></button>
            </div>

            <div id="scoreTab">
                <div class="card">
                    <h3>กรองข้อมูล / ส่งออก</h3>
                    <div class="form-grid" style="margin-top:10px;">
                        <div>
                            <label>เลือกห้อง</label>
                            <select id="filterRoom" onchange="renderTeacherTable()">
                                <option value="all">ทุกห้องเรียน</option>
                                <option value="1">ห้อง 1</option>
                                <option value="2">ห้อง 2</option>
                                <option value="3">ห้อง 3</option>
                                <option value="4">ห้อง 4</option>
                                <option value="5">ห้อง 5</option>
                            </select>
                        </div>
                        <div style="display:flex; align-items:flex-end;">
                            <button class="btn btn-main" onclick="exportExcel()">📥 Download Excel (CSV)</button>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="table-res">
                        <table id="mainTable">
                            <thead>
                                <tr>
                                    <th>ห้อง</th>
                                    <th>รหัส</th>
                                    <th>ชื่อ</th>
                                    <th>งาน(40)</th>
                                    <th>กลาง(20)</th>
                                    <th>ปลาย(20)</th>
                                    <th>จิต(10)</th>
                                    <th>เกรด</th>
                                    <th>จัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="teacherTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="approveTab" class="hidden">
                <div class="card">
                    <h3>รายการรออนุมัติเข้าเรียน</h3>
                    <div class="table-res">
                        <table>
                            <thead>
                                <tr>
                                    <th>ห้อง</th>
                                    <th>รหัสนักศึกษา</th>
                                    <th>ชื่อ-นามสกุล</th>
                                    <th>การจัดการ</th>
                                </tr>
                            </thead>
                            <tbody id="pendingTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- STUDENT AREA -->
        <div id="studentArea" class="hidden">
            <div id="approvedContent" class="hidden">
                <div class="card" style="text-align: center;">
                    <h2 id="stName"></h2>
                    <p id="stId"></p>
                    <div style="font-size: 50px; margin: 20px 0; font-weight: bold;" id="stGrade">-</div>
                    <div class="form-grid">
                        <div class="card">งาน: <span id="s1"></span></div>
                        <div class="card">กลาง: <span id="s2"></span></div>
                        <div class="card">ปลาย: <span id="s3"></span></div>
                        <div class="card">จิต: <span id="s4"></span></div>
                    </div>
                </div>
            </div>
            <div id="pendingContent" class="card" style="text-align: center; padding: 50px;">
                <h2 style="color: var(--warning);">⏳ อยู่ระหว่างรอคุณครูอนุมัติ</h2>
                <p>ข้อมูลของคุณจะปรากฏที่นี่หลังจากได้รับการอนุมัติเข้าห้องเรียนแล้ว</p>
            </div>
        </div>
    </div>
</div>

<script>
    let students = JSON.parse(localStorage.getItem('edu_db')) || [];
    let currentUser = null;

    function setAuthMode(mode) {
        document.getElementById('loginForm').classList.toggle('hidden', mode === 'reg');
        document.getElementById('regForm').classList.toggle('hidden', mode === 'login');
        document.querySelectorAll('.tab-btn')[0].classList.toggle('active', mode === 'login');
        document.querySelectorAll('.tab-btn')[1].classList.toggle('active', mode === 'reg');
    }

    function handleRegister() {
        const id = document.getElementById('regId').value.trim();
        const name = document.getElementById('regName').value.trim();
        const room = document.getElementById('regRoom').value;

        if(!id || !name) return alert('กรุณากรอกข้อมูลให้ครบ');
        if(students.find(s => s.id === id)) return alert('รหัสนี้มีในระบบแล้ว');

        students.push({
            id, name, room, 
            status: 'pending',
            scores: { w:0, m:0, f:0, s:0 },
            total: 0, grade: 'F'
        });
        saveDB();
        alert('ส่งคำขอลงทะเบียนแล้ว กรุณาแจ้งครูให้กดอนุมัติ');
        location.reload();
    }

    function handleLogin() {
        const id = document.getElementById('loginId').value.trim();
        if(id === 'admin') {
            currentUser = { role: 'teacher', name: 'คุณครู' };
            showDashboard();
        } else {
            const student = students.find(s => s.id === id);
            if(!student) return alert('ไม่พบรหัสนักศึกษา หรือ ยังไม่ได้ลงทะเบียน');
            currentUser = { role: 'student', data: student };
            showDashboard();
        }
    }

    function showDashboard() {
        document.getElementById('authPanel').classList.add('hidden');
        document.getElementById('mainPanel').classList.remove('hidden');
        document.getElementById('userInfo').innerHTML = `<b>ผู้ใช้:</b> ${currentUser.name || currentUser.data.name} `;
        
        if(currentUser.role === 'teacher') {
            document.getElementById('teacherArea').classList.remove('hidden');
            renderTeacherTable();
            renderPendingTable();
        } else {
            document.getElementById('studentArea').classList.remove('hidden');
            if(currentUser.data.status === 'approved') {
                document.getElementById('approvedContent').classList.remove('hidden');
                document.getElementById('pendingContent').classList.add('hidden');
                const d = currentUser.data;
                document.getElementById('stName').innerText = d.name;
                document.getElementById('stId').innerText = `ห้อง ${d.room} | รหัส ${d.id}`;
                document.getElementById('stGrade').innerText = `เกรด ${d.grade} (${d.total} คะแนน)`;
                document.getElementById('s1').innerText = d.scores.w;
                document.getElementById('s2').innerText = d.scores.m;
                document.getElementById('s3').innerText = d.scores.f;
                document.getElementById('s4').innerText = d.scores.s;
            }
        }
    }

    function renderTeacherTable() {
        const filter = document.getElementById('filterRoom').value;
        const tbody = document.getElementById('teacherTableBody');
        tbody.innerHTML = '';

        students.filter(s => s.status === 'approved' && (filter === 'all' || s.room === filter))
        .forEach(s => {
            tbody.innerHTML += `
                <tr>
                    <td><span class="room-tag">ห้อง ${s.room}</span></td>
                    <td>${s.id}</td>
                    <td style="text-align:left;">${s.name}</td>
                    <td><input type="number" value="${s.scores.w}" onchange="updateScore('${s.id}', 'w', this.value)" style="width:50px"></td>
                    <td><input type="number" value="${s.scores.m}" onchange="updateScore('${s.id}', 'm', this.value)" style="width:50px"></td>
                    <td><input type="number" value="${s.scores.f}" onchange="updateScore('${s.id}', 'f', this.value)" style="width:50px"></td>
                    <td><input type="number" value="${s.scores.s}" onchange="updateScore('${s.id}', 's', this.value)" style="width:50px"></td>
                    <td><b>${s.grade}</b></td>
                    <td><button class="btn btn-danger" onclick="deleteUser('${s.id}')">ลบ</button></td>
                </tr>
            `;
        });
    }

    function updateScore(id, type, val) {
        const s = students.find(x => x.id === id);
        s.scores[type] = parseFloat(val) || 0;
        s.total = s.scores.w + s.scores.m + s.scores.f + s.scores.s;
        
        if(s.total >= 80) s.grade = 'A';
        else if(s.total >= 70) s.grade = 'B';
        else if(s.total >= 60) s.grade = 'C';
        else if(s.total >= 50) s.grade = 'D';
        else s.grade = 'F';

        saveDB();
        renderTeacherTable();
    }

    function renderPendingTable() {
        const pending = students.filter(s => s.status === 'pending');
        document.getElementById('pendingCount').innerText = pending.length;
        const tbody = document.getElementById('pendingTableBody');
        tbody.innerHTML = '';
        pending.forEach(s => {
            tbody.innerHTML += `
                <tr>
                    <td>ห้อง ${s.room}</td>
                    <td>${s.id}</td>
                    <td>${s.name}</td>
                    <td>
                        <button class="btn btn-success" onclick="approve('${s.id}')">อนุมัติ</button>
                        <button class="btn btn-danger" onclick="deleteUser('${s.id}')">ปฏิเสธ</button>
                    </td>
                </tr>
            `;
        });
    }

    function approve(id) {
        students.find(s => s.id === id).status = 'approved';
        saveDB();
        renderTeacherTable();
        renderPendingTable();
    }

    function deleteUser(id) {
        if(confirm('ยืนยันการลบข้อมูล?')) {
            students = students.filter(s => s.id !== id);
            saveDB();
            renderTeacherTable();
            renderPendingTable();
        }
    }

    function showTeacherTab(tab) {
        document.getElementById('scoreTab').classList.toggle('hidden', tab !== 'score');
        document.getElementById('approveTab').classList.toggle('hidden', tab !== 'approve');
        document.querySelectorAll('.tab-btn')[2].classList.toggle('active', tab === 'score');
        document.querySelectorAll('.tab-btn')[3].classList.toggle('active', tab === 'approve');
    }

    function saveDB() { localStorage.setItem('edu_db', JSON.stringify(students)); }

    function exportExcel() {
        let csv = "\uFEFFห้อง,รหัส,ชื่อ,รวม,เกรด\n";
        students.filter(s => s.status === 'approved').forEach(s => {
            csv += `${s.room},${s.id},${s.name},${s.total},${s.grade}\n`;
        });
        const blob = new Blob([csv], {type: 'text/csv;charset=utf-8'});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "คะแนนนักเรียน_แยกห้อง.csv";
        link.click();
    }
</script>
</body>
</html>
