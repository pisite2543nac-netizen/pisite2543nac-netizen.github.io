<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Quest - เกมเรียนรู้ HTML</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800;900&family=Fira+Code:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root{--bg:#0d1117;--card:#161b22;--card2:#1c2333;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--accent:#00ff88;--accent-dim:#00cc6a;--gold:#e3b341;--danger:#ff6b6b;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Kanit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
        #bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;}
        #app{position:relative;z-index:1;min-height:100vh;}
        .cf{font-family:'Fira Code',monospace;}
        .xp-outer{background:var(--border);border-radius:999px;height:10px;overflow:hidden;}
        .xp-inner{height:100%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));border-radius:999px;transition:width .8s cubic-bezier(.25,1,.5,1);box-shadow:0 0 10px rgba(0,255,136,.4);}
        .gc{background:var(--card);border:1px solid var(--border);border-radius:16px;transition:all .3s ease;}
        .bp{background:linear-gradient(135deg,var(--accent-dim),var(--accent));color:#0d1117;font-weight:700;padding:12px 28px;border-radius:12px;border:none;cursor:pointer;font-size:.95rem;font-family:'Kanit',sans-serif;transition:all .3s ease;box-shadow:0 4px 20px rgba(0,255,136,.3);display:inline-flex;align-items:center;justify-content:center;gap:8px;}
        .bp:hover{transform:translateY(-2px);box-shadow:0 6px 30px rgba(0,255,136,.5);}.bp:active{transform:translateY(0);}.bp:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none;}
        .bs{background:var(--card2);color:var(--text);font-weight:600;padding:10px 22px;border-radius:12px;border:1px solid var(--border);cursor:pointer;font-size:.88rem;font-family:'Kanit',sans-serif;transition:all .3s ease;display:inline-flex;align-items:center;justify-content:center;gap:8px;}
        .bs:hover{border-color:var(--accent);color:var(--accent);}
        .bsm{padding:7px 16px;font-size:.8rem;border-radius:10px;}
        .code-block{background:#0a0e14;border:1px solid var(--border);border-radius:12px;padding:16px;overflow-x:auto;font-family:'Fira Code',monospace;font-size:.78rem;line-height:1.8;tab-size:2;white-space:pre;}
        .code-block .tag{color:#7ee787;}.code-block .attr{color:#79c0ff;}.code-block .val{color:#ffa657;}.code-block .cmt{color:#8b949e;font-style:italic;}.code-block .doctype{color:#8b949e;}
        .pf{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:#fff;}
        .pf iframe{width:100%;height:180px;border:none;display:block;}
        .pb{background:var(--card);padding:7px 14px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);}
        .pd{width:10px;height:10px;border-radius:50%;}
        .ew{display:flex;background:#0a0e14;border:2px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .4s,box-shadow .4s;min-height:220px;}
        .ew.ok{border-color:var(--accent);box-shadow:0 0 20px rgba(0,255,136,.15);}
        .ew.err{border-color:var(--danger);box-shadow:0 0 15px rgba(255,107,107,.15);}
        .ln{padding:12px 0;min-width:38px;text-align:right;padding-right:8px;color:#484f58;font-family:'Fira Code',monospace;font-size:.78rem;line-height:1.8;user-select:none;border-right:1px solid var(--border);overflow:hidden;background:#0a0e14;flex-shrink:0;}
        .ce{flex:1;padding:12px;background:transparent;color:var(--text);font-family:'Fira Code',monospace;font-size:.78rem;line-height:1.8;border:none;outline:none;resize:none;tab-size:2;white-space:pre;overflow:auto;min-height:220px;}
        .ce::selection{background:rgba(0,255,136,.2);}
        .ci{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;transition:all .3s;font-size:.85rem;}
        .ci.pass{background:rgba(0,255,136,.08);color:var(--accent);}.ci.fail{background:rgba(255,107,107,.08);color:var(--danger);}.ci.pend{background:var(--card2);color:var(--muted);}
        .ch{font-size:.74rem;color:var(--muted);margin-top:3px;margin-left:28px;padding:5px 9px;background:rgba(227,179,65,.08);border-radius:8px;border-left:3px solid var(--gold);display:none;}.ci.fail .ch{display:block;}
        .mn{position:relative;cursor:pointer;transition:all .3s;}.mn.locked{opacity:.4;cursor:not-allowed;}.mn.locked:hover{opacity:.5;}
        .mn.done .nc{background:var(--accent);border-color:var(--accent);}.mn.cur .nc{border-color:var(--accent);animation:np 2s ease-in-out infinite;}
        .nc{width:46px;height:46px;border-radius:50%;border:3px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .3s;}
        .mc{width:3px;height:30px;margin:0 auto;border-radius:2px;}.mc.d{background:var(--accent);}.mc.p{background:var(--border);}
        .coin-i{color:var(--gold);filter:drop-shadow(0 0 4px rgba(227,179,65,.5));}
        .auth-card{max-width:440px;width:100%;}
        .tab-btn{padding:10px 0;flex:1;text-align:center;font-weight:600;cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;color:var(--muted);}
        .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
        .input-field{width:100%;padding:11px 14px;background:var(--card2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-family:'Kanit',sans-serif;font-size:.92rem;outline:none;transition:border-color .3s;}
        .input-field:focus{border-color:var(--accent);}.input-field::placeholder{color:var(--muted);}
        .admin-toggle{cursor:pointer;transition:color .3s;}.admin-toggle:hover{color:var(--gold);}
        .admin-box{max-height:0;overflow:hidden;transition:max-height .4s ease,opacity .3s ease;opacity:0;}
        .admin-box.open{max-height:200px;opacity:1;}
        .modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:95;display:flex;align-items:center;justify-content:center;animation:fi .2s ease;padding:16px;}
        .modal-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;max-width:440px;width:100%;animation:sc .3s ease;max-height:90vh;overflow-y:auto;}
        .del-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:.8rem;}
        .del-btn:hover{border-color:var(--danger);color:var(--danger);background:rgba(255,107,107,.1);}
        .diff-easy{color:var(--accent);}.diff-medium{color:#f0883e;}.diff-hard{color:var(--danger);}
        .sb{animation:si .4s ease forwards;border-radius:12px;padding:12px 20px;display:flex;align-items:center;gap:10px;font-weight:500;box-shadow:0 8px 30px rgba(0,0,0,.4);pointer-events:auto;}
        .sb.lv{animation:so .3s ease forwards;}
        .sb-s{background:rgba(0,255,136,.15);border:1px solid rgba(0,255,136,.3);color:var(--accent);}.sb-e{background:rgba(255,107,107,.15);border:1px solid rgba(255,107,107,.3);color:var(--danger);}.sb-i{background:rgba(227,179,65,.15);border:1px solid rgba(227,179,65,.3);color:var(--gold);}
        .suc-b{background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.3);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;}
        .err-b{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:12px;padding:14px 18px;display:flex;align-items:center;gap:12px;}
        .confetti{position:fixed;width:10px;height:10px;z-index:100;animation:cfa linear forwards;pointer-events:none;}
        .lu-ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:90;display:flex;align-items:center;justify-content:center;animation:fi .3s ease;}.lu-c{text-align:center;animation:sc .5s ease;}
        @keyframes np{0%,100%{box-shadow:0 0 0 0 rgba(0,255,136,.4);}50%{box-shadow:0 0 0 12px rgba(0,255,136,0);}}
        @keyframes fiu{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fi{from{opacity:0;}to{opacity:1;}}
        @keyframes sd{from{opacity:0;transform:translateY(-20px);}to{opacity:1;transform:translateY(0);}}
        @keyframes fl{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
        @keyframes gl{0%,100%{text-shadow:0 0 20px rgba(0,255,136,.3);}50%{text-shadow:0 0 40px rgba(0,255,136,.6),0 0 80px rgba(0,255,136,.2);}}
        @keyframes sc{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
        @keyframes cfa{0%{transform:translateY(-100vh) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}
        @keyframes si{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
        @keyframes so{from{transform:translateX(0);opacity:1;}to{transform:translateX(100%);opacity:0;}}
        .afiu{animation:fiu .6s ease forwards;}.afi{animation:fi .5s ease forwards;}.asd{animation:sd .4s ease forwards;}.afl{animation:fl 3s ease-in-out infinite;}.agl{animation:gl 3s ease-in-out infinite;}
        .s1{animation-delay:.1s;opacity:0;}.s2{animation-delay:.2s;opacity:0;}.s3{animation-delay:.3s;opacity:0;}.s4{animation-delay:.4s;opacity:0;}
        .rev-point{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:12px;background:var(--card2);border-left:3px solid var(--accent);transition:all .3s;}
        .rev-point:hover{background:rgba(0,255,136,.05);}
        .rev-tip{display:flex;align-items:flex-start;gap:12px;padding:12px 16px;border-radius:12px;background:rgba(227,179,65,.06);border-left:3px solid var(--gold);}
        .rev-num{width:28px;height:28px;border-radius:50%;background:var(--accent);color:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;flex-shrink:0;}
        ::-webkit-scrollbar{width:5px;height:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
        @media(max-width:768px){.code-block,.ce,.ln{font-size:.68rem;}.nc{width:40px;height:40px;font-size:.9rem;}.mc{height:24px;}.ew,.ce{min-height:170px;}.atw{font-size:.72rem;}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important;}}
    </style>
</head>
<body>
    <canvas id="bgCanvas" aria-hidden="true"></canvas>
    <div id="app" role="main"></div>
    <div id="tc" style="position:fixed;top:20px;right:20px;z-index:80;display:flex;flex-direction:column;gap:10px;pointer-events:none;"></div>
    <div id="oc"></div>
<script>
const ADMIN_CODE='admin1234';
const DEFAULT_PW='123456';
const LL=[
{id:1,d:'ง่าย',title:'โครงสร้างพื้นฐาน HTML',icon:'fa-solid fa-house-chimney',desc:'เรียนรู้โครงสร้างหลักของเอกสาร HTML',
pts:['ทุกเอกสารเริ่มด้วย <!DOCTYPE html>','<html> เป็นภาชนะหลักครอบทุกอย่าง','<head> ใส่ข้อมูลเมตา เช่น <title>','<body> ใส่เนื้อหาที่แสดงบนจอนจริง'],
code:'<!DOCTYPE html>\n<html>\n  <head><title>หน้าเว็บ</title></head>\n  <body>\n    <h1>สวัสดี</h1>\n    <p>เว็บแรก</p>\n  </body>\n</html>',
prac:{t:'สร้างหน้าเว็บพื้นฐาน',d:'เติม h1 และ p ใน body',s:'<!DOCTYPE html>\n<html>\n  <head><title>ฝึก</title></head>\n  <body>\n    \n  </body>\n</html>',c:[{l:'มี <h1>',k:d=>!!d.querySelector('h1'),h:'เขียน <h1>หัวข้อ</h1>'},{l:'มี <p>',k:d=>!!d.querySelector('p'),h:'เขียน <p>ข้อความ</p>'}],xp:10,gh:'เนื้อหาอยู่ใน <body>'},
tips:['อย่าลืม <!DOCTYPE html> เป็นบรรทัดแรกเสมอ','<html>, <head>, <body> ต้องเปิด-ปิดให้ครบ','<title> ต้องอยู่ใน <head> เท่านั้น','ข้อความทุกอย่างต้องอยู่ใน <body>'],
tests:[{t:'สร้างเว็บมีชื่อ',d:'title เป็น "เว็บของฉัน" และมี h1',s:'<!DOCTYPE html>\n<html>\n  <head><title></title></head>\n  <body>\n    \n  </body>\n</html>',c:[{l:'title เป็น "เว็บของฉัน"',k:(d,c)=>/<title>\s*เว็บของฉัน\s*<\/title>/i.test(c)},{l:'มี <h1>',k:d=>!!d.querySelector('h1')}]},
{t:'เพิ่มย่อหน้า',d:'สร้าง p พร้อมข้อความ',s:'<!DOCTYPE html>\n<html>\n  <head><title>ทดสอบ</title></head>\n  <body>\n    \n  </body>\n</html>',c:[{l:'มี <p> มีข้อความ',k:d=>{const p=d.querySelector('p');return p&&p.textContent.trim().length>0;}}]},
{t:'สร้างเว็บครบ',d:'มี DOCTYPE, h1, p',s:'',c:[{l:'มี DOCTYPE',k:(d,c)=>/<!DOCTYPE\s+html>/i.test(c)},{l:'มี <h1>',k:d=>!!d.querySelector('h1')},{l:'มี <p>',k:d=>!!d.querySelector('p')}]}]},

{id:2,d:'ง่าย',title:'หัวข้อและย่อหน้า',icon:'fa-solid fa-heading',desc:'เรียนรู้ h1-h6 และ p, hr, br',
pts:['<h1> ถึง <h6> สร้างหัวข้อ h1 ใหญ่สุด','<p> สร้างย่อหน้า','<hr> สร้างเส้นแบ่ง','<br> ขึ้นบรรทัดใหม่'],
code:'<h1>หัวข้อ h1</h1>\n<h2>หัวข้อ h2</h2>\n<p>ย่อหน้า</p>\n<hr>\n<p>อีกย่อหน้า</p>',
prac:{t:'สร้างหัวข้อ 2 ระดับ',d:'สร้าง h1, h2 และ p',s:'<!DOCTYPE html>\n<html>\n  <head><title>ฝึก</title></head>\n  <body>\n    \n  </body>\n</html>',c:[{l:'มี <h1>',k:d=>!!d.querySelector('h1')},{l:'มี <h2>',k:d=>!!d.querySelector('h2')},{l:'มี <p>',k:d=>!!d.querySelector('p')}],xp:12,gh:'h1 ใหญ่สุด h2 รองลงมา'},
tips:['h1 = ใหญ่ที่สุด, h6 = เล็กที่สุด','<p> = ย่อหน้าข้อความ ไม่ใช่หัวข้อ','<hr> = เส้นแนวนแบ่ง, <br> = ขึ้นบรรทัดใหม่','แต่ละ h จะขึ้นบรรทัดใหม่อัตโนัว'],
tests:[{t:'สร้าง h1 และ h3',d:'สร้าง h1 และ h3',s:'<!DOCTYPE html>\n<html><head><title>ทดสอบ</title></head><body>\n    \n  </body></html>',c:[{l:'มี <h1>',k:d=>!!d.querySelector('h1')},{l:'มี <h3>',k:d=>!!d.querySelector('h3')}]},
{t:'ใช้เส้นแบ่ง',d:'มี p อย่างน้อย 2 และ hr',s:'<!DOCTYPE html>\n<html><head><title>ทดสอบ</title></head><body>\n    \n  </body></html>',c:[{l:'มี <p> อย่างน้อย 2',k:d=>d.querySelectorAll('p').length>=2},{l:'มี <hr>',k:d=>!!d.querySelector('hr')}]},
{t:'สร้างลำดับหัวข้อ',d:'สร้าง h1, h2, h3',s:'<!DOCTYPE html>\n<html><head><title>ทดสอบ</title></head><body>\n    \n  </body></html>',c:[{l:'มี <h1>',k:d=>!!d.querySelector('h1')},{l:'มี <h2>',k:d=>!!d.querySelector('h2')},{l:'มี <h3>',k:d=>!!d.querySelector('h3')}]}]},

{id:3,d:'ง่าย',title:'จัดรูปแบบข้อความ',icon:'fa-solid fa-font',desc:'เรียนรู้ strong, em, u, mark',
pts:['<strong> ตัวหนา มีนัยสำคัญ','<em> ตัวเอียง เน้นย้ำ','<u> ขีดเส้นใต้','<mark> ไฮไลท์'],
code:'<p><strong>ตัวหนา</strong></p>\n<p><em>ตัวเอียง</em></p>\n<p><u>ขีดเส้นใต้</u></p>\n<p><mark>ไฮไลท์</mark></p>',
prac:{t:'จัดรูปแบบข้อความ',d:'ใช้ strong, em, mark',s:'<!DOCTYPE html>\n<html><head><title>ฝึก</title></head><body>\n    <p>ข้อความ</p>\n  </body></html>',c:[{l:'มี <strong>',k:d=>!!d.querySelector('strong')},{l:'มี <em>',k:d=>!!d.querySelector('em')},{l:'มี <mark>',k:d=>!!d.querySelector('mark')}],xp:14,gh:'ครอบข้อความด้วยแท็ก'},
tips:['strong = ตัวหนา, ใช้เมื่อข้อความสำคัญ','em = เอียง, ใช้เมื่อต้องการเน้น','u = ขีดเส้นใต้, mark = ไฮไลท์','ทั้ง 4 แท็กนี้เป็น inline elements ครอบข้อความ'],
tests:[{t:'ใช้ตัวหนาและเอียง',d:'p ที่มี strong และ em',s:'<!DOCTYPE html>\n<html><head><title>ทดสอบ</title></head><body>\n    \n  </body></html>',c:[{l:'มี <strong>',k:d=>!!d.querySelector('strong')},{l:'มี <em>',k:d=>!!d.querySelector('em')},{l:'อยู่ p เดียวกัน',k:d=>{const p=d.querySelector('p');return p&&p.querySelector('strong')&&p.querySelector('em');}}]},
{t:'ใช้ขีดเส้นใต้และไฮไลท์',d:'มี u และ mark',s:'<!DOCTYPE html>\n<html><head><title>ทดสอบ</title></head><body>\n    \n  </body></html>',c:[{l:'มี <u>',k:d=>!!d.querySelector('u')},{l:'มี <mark>',k:d=>!!d.querySelector('mark')}]},
{t:'ใช้ครบ 4 แท็ก',d:'strong, em, u, mark ครบ',s:'<!DOCTYPE html>\n<html><head><title>ทดสอบ</title></head><body>\n    \n  </body></html>',c:[{l:'มี <strong>',k:d=>!!d.querySelector('strong')},{l:'มี <em>',k:d=>!!d.querySelector('em')},{l:'มี <u>',k:d=>!!d.querySelector('u')},{l:'มี <mark>',k:d=>!!d.querySelector('mark')}]}]},

{id:4,d:'ง่าย',title:'ลิงก์และรูปภาพ',icon:'fa-solid fa-link',desc:'เรียนรู้ a href และ img src',
pts:['<a href="URL"> สร้างลิงก์','<img src="URL" alt="..."> รูปภาพ','alt สำคัญต่อการเข้าถึง','target="_blank" เปิดแท็บใหม่'],
code:'<a href="https://example.com">คลิก</a>\n<br><br>\n<img src="https://picsum.photos/seed/hq/300/150" alt="รูป">',
prac:{t:'สร้างลิงก์และรูป',d:'สร้าง a พร้อม href และ img พร้อม src',s:'<!DOCTYPE html>\n<html><head><title>ฝึก</title></head><body>\n    \n  </body></html>',c:[{l:'มี <a> พร้อม href',k:(d,c)=>/<a\s+[^>]*href\s*=/i.test(c)},{l:'มี <img> พร้อม src',k:(d,c)=>/<img\s+[^>]*src\s*=/i.test(c)}],xp:14,gh:'a ใช้ href, img ใช้ src'},

const AX={c:null,init(){if(!this.c)this.c=new(window.AudioContext||window.webkitAudioContext)();},
p(t){try{this.init();const o=this.c.createOscillator(),g=this.c.createGain();o.connect(g);g.connect(this.c.destination);g.gain.value=.06;const n=this.c.currentTime;
if(t==='ok'){o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+.1);o.frequency.setValueAtTime(784,n+.2);g.gain.exponentialRampToValueAtTime(.001,n+.4);o.start(n);o.stop(n+.4);}
else if(t==='no'){o.type='sawtooth';o.frequency.setValueAtTime(300,n);o.frequency.exponentialRampToValueAtTime(150,n+.3);g.gain.exponentialRampToValueAtTime(.001,n+.3);o.start(n);o.stop(n+.3);}
else if(t==='lv'){o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+.12);o.frequency.setValueAtTime(784,n+.24);o.frequency.setValueAtTime(1047,n+.36);g.gain.exponentialRampToValueAtTime(.001,n+.6);o.start(n);o.stop(n+.6);}
else if(t==='co'){o.type='triangle';o.frequency.setValueAtTime(1200,n);o.frequency.setValueAtTime(1600,n+.06);g.gain.exponentialRampToValueAtTime(.001,n+.15);o.start(n);o.stop(n+.15);}
else if(t==='cl'){o.type='sine';o.frequency.setValueAtTime(800,n);g.gain.value=.03;g.gain.exponentialRampToValueAtTime(.001,n+.07);o.start(n);o.stop(n+.07);}
else if(t==='win'){o.frequency.setValueAtTime(523,n);o.frequency.setValueAtTime(659,n+.1);o.frequency.setValueAtTime(784,n+.2);o.frequency.setValueAtTime(1047,n+.3);o.frequency.setValueAtTime(1319,n+.4);g.gain.exponentialRampToValueAtTime(.001,n+.7);o.start(n);o.stop(n+.7);}
}catch(e){}}};

const bgC=document.getElementById('bgCanvas'),bgX=bgC.getContext('2d');let bgS=[];
function initBg(){bgC.width=innerWidth;bgC.height=innerHeight;bgS=[];const sy=['<','>','/','=','"','}','{','}',';','#','</>','<div>','<p>','<h1>','<img>','<table>','<form>','<video>','<style>'];const cn=Math.floor((bgC.width*bgC.height)/32000);for(let i=0;i<cn;i++)bgS.push({x:Math.random()*bgC.width,y:Math.random()*bgC.height,s:sy[Math.floor(Math.random()*sy.length)],sz:10+Math.random()*12,sp:.08+Math.random()*.2,op:.025+Math.random()*.05,dr:(Math.random()-.5)*.15});}
function aBg(){bgX.clearRect(0,0,bgC.width,bgC.height);bgS.forEach(s=>{s.y-=s.sp;s.x+=s.dr;if(s.y<-30){s.y=bgC.height+30;s.x=Math.random()*bgC.width;}if(s.x<-30)s.x=bgC.width+30;if(s.x>bgC.width+30)s.x=-30;bgX.font=`${s.sz}px "Fira Code",monospace`;bgX.fillStyle=`rgba(0,255,136,${s.op})`;bgX.fillText(s.s,s.x,s.y);});requestAnimationFrame(aBg);}
addEventListener('resize',()=>{bgC.width=innerWidth;bgC.height=innerHeight;});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function hlC(c){let h=esc(c);h=h.replace(/(&lt;!--[\s\S]*?--&gt;)/g,'<span class="cmt">$1</span>');h=h.replace(/(&lt;!DOCTYPE\s+html&gt;)/gi,'<span class="doctype">$1</span>');h=h.replace(/(&lt;\/?)([\w-]+)/g,'$1<span class="tag">$2</span>');h=h.replace(/([\w-]+)(=)(&quot;)(.*?)(&quot;)/g,'<span class="attr">$1</span>$2<span class="val">$3$4$5</span>');return h;}
function gLv(xp){let l=LVLS[0];for(const v of LVLS)if(xp>=v.m)l=v;return l;}
function gLi(xp){let i=0;for(let j=0;j<LVLS.length;j++)if(xp>=LVLS[j].m)i=j;return i;}
function gNx(xp){const i=gLi(xp);return i>=LVLS.length-1?LVLS[i].m:LVLS[i+1].m;}
function gCx(xp){return LVLS[gLi(xp)].m;}
function gSt(id){return S.lScores[id]?'done':(id===1||S.lScores[id-1]?'cur':'locked');}
function allDone(){return LL.every(l=>S.lScores[l.id]);}
function gBody(c){const m=c.match(/<body[^>]*>([\s\S]*?)<\/body>/i);return m?m[1]:c;}
function toast(m,t='s'){const c=document.getElementById('tc');const d=document.createElement('div');d.className=`sb sb-${t}`;const ic={s:'fa-circle-check',e:'fa-circle-xmark',i:'fa-circle-info'};d.innerHTML=`<i class="fa-solid ${{s:'fa-circle-check',e:'fa-circle-xmark',i:'fa-circle-info'}[t]||'fa-circle-info'}"></i><span>${m}</span>`;c.appendChild(d);setTimeout(()=>d.classList.add('lv'),2500);setTimeout(()=>d.remove(),2900);}
function conf(n=40){const cs=['#00ff88','#e3b341','#ff6b6b','#79c0ff','#ffa657','#d2a8ff'];for(let i=0;i<n;i++){const p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=cs[Math.floor(Math.random()*cs.length)];p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.animationDuration=(2+Math.random()*3)+'s';p.style.animationDelay=Math.random()*1.2+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),5500);}}
function last3(id){return id.length>=3?id.slice(-3):id;}
function getU(){try{return JSON.parse(localStorage.getItem('hq_u'))||[];}catch(e){return[];}}
function saveU(u){localStorage.setItem('hq_u',JSON.stringify(u));}
function findU(sid){return getU().find(u=>u.sid===sid);}
function regU(name,sid,room,pw){
    if(!name.trim())return'กรุณากรอกชื่อ';if(!sid.trim())return'กรุณากรอกรหัสนักศึกษา';
    if(sid.trim().length<3)return'รหัสนักศึกษาต้องมีอย่างน้อย 3 ตัว';if(!room.trim())return'กรุณากรอกห้องเรียน';if(pw.length<3)return'รหัสผ่านต้องมีอย่างน้อย 3 ตัวอักษร';if(findU(sid.trim()))return'รหัสนักศึกษานี้มีอยู่แล้ว';
    const u=getU();u.push({name:name.trim(),sid:sid.trim(),room:room.trim(),password:pw,xp:0,coins:0,lScores:{},pDone:{},tDone:{},maxStreak:0});saveU(u);return'ok';
}
function loginU(sid,pw){const u=findU(sid.trim());if(!u)return'ไม่พบรหัสนักศึกษานี้';if(u.password!==pw)return'รหัสผ่านไม่ถูกต้อง';return u;}
function delU(sid){const u=getU();const i=u.findIndex(x=>x.sid===sid);if(i>=0){u.splice(i,1);saveU(u);}}
function saveCur(){if(!S.user||S.user.role==='admin')return;const u=getU();const i=u.findIndex(x=>x.sid===S.user.sid);if(i>=0){u[i]={...u[i],xp:S.xp,coins:S.coins,lScores:S.lScores,pDone:S.pDone,tDone:S.tDone,maxStreak:S.maxStreak};saveU(u);}}
function loadU(u){S.xp=u.xp||0;S.coins=u.coins||0;S.lScores=u.lScores||{};S.pDone=u.pDone||{};S.tDone=u.tDone||{};S.maxStreak=u.maxStreak||0;S.prevLvl=gLi(S.xp);}
function last3(id){return id.length>=3?id.slice(-3):id;}

/* สถิตะ กรอบเพิ่มเก็ต้น */
const DFS=(id)=>{const l=LL.find(x=>x.id===id);return l?{c:l.c,tips:l.tips,tests:l.tests}:null;};

/* สถานะบอกเปิดตัว */
const DX={submit:5,Coins:3};
const DL=()=>DFS(1);
function DFS(id){const l=DFS(id);
if(l){l.c.forEach(ck=>{ck.visited=false;DFS(ck.lk);});}return l;}
function DX(id){const l=DFS(id);
if(!l)return null;const r={l.t.map(t=>({t:t.t,l:t.l,k:Math.max(0,...t.c.map(ck=>DFS(ck.l)?1:0))})).filter(r=>r.k>0);
return r.length>0?r:null;}
function getUndone(){const u=getU();return u.filter(u=>LL.every(l=>u.lScores[l.id])).length>0?u:null:u[0];}

/* สถานะบอกเพิ่ม */
function getU(){try{return JSON.parse(localStorage.getItem('hq_u'))||[];}catch(e){return[];}}
function saveU(u){localStorage.setItem('hq_u',JSON.stringify(u));}
function findU(sid){return getU().find(u=>u.sid===sid);}
function regU(name,sid,room,pw){
    if(!name.trim())return'กรุณากรอกชื่อ';if(!sid.trim())return'กรุณากรอกรหัสนักศึกษา';if(sid.trim().length<3)return'รหัสนักศึกษาต้องมีอย่างน้อย 3 ตัวอักษร';if(!room.trim())return'กรุณากรอกห้องเรียน';if(pw.length<3)return'รหัสผ่านต้องมีอย่างน้อย ด่านักอัษร';if(findU(sid.trim()))return'รหัสนักศึกษานี้มีอยู่แล้ว';const u=getU();u.push({name:name.trim(),sid:sid.trim(),room:room.trim(),password:pw,xp:0,coins:0,lScores:{},pDone:{},tDone:{},maxStreak:0});saveU(u);return'ok';
}
function loginU(sid,pw){const u=findU(sid.trim());if(!u)return'ไม่พบรหัสนักศึกษานี้';if(u.password!==pw)return'รหัสผ่านไม่ถูกต้อง';return u;}
function delU(sid){const u=getU();const i=u.findIndex(x=>x.sid===sid);if(i>=0){u.splice(i,1);saveU(u);}}
function saveCur(){if(!S.user||S.user.role==='admin')return;const u=getU();const i=u.findIndex(x=>x.sid===S.user.sid);if(i>=0){u[i]={...u[i],xp:S.xp,coins:S.coins,lScores:S.lScores,pDone:S.pDone,tDone:S.tDone,maxStreak:S.maxStreak};saveU(u);}}
function loadU(u){S.xp=u.xp||0;S.coins=u.coins||0;S.lScores=u.lScores||{};S.pDone=u.pDone||{};S.tDone=u.tDone||{};S.maxStreak=u.maxStreak||0;S.prevLvl=gLi(S.xp);}
function getSt(id){return S.lScores[id]?'done':(id===1||S.lScores[id-1]?'cur':'locked');}
function allDone(){return LL.every(l=>S.lScores[l.id]);}
function gBody(c){const m=c.match(/<body[^>]*>([\s\S]*?)<\/body>/i);return m?m[1]:c;}
function toast(m,t='s'){const c=document.getElementById('tc');const d=document.createElement('div');d.className=`sb sb-${t}`;d.innerHTML=`<i class="fa-solid ${{s:'fa-circle-check',e:'fa-circle-xmark',i:'fa-circle-info'}[t]||'fa-circle-info'}"></i><span>${m}</span>`;c.appendChild(d);setTimeout(()=>d.classList.add('lv'),2500);setTimeout(()=>d.remove(),2900);}
function conf(n=40){const cs=['#00ff88','#e3b341','#ff6b6b','#79c0ff','#ffa657','#d2a8ff'];for(let i=0;i<n;i++){const p=document.createElement('div');p.className='confetti';p.style.left=Math.random()*100+'vw';p.style.background=cs[Math.floor(Math.random()*cs.length)];p.style.width=(6+Math.random()*8)+'px';p.style.height=(6+Math.random()*8)+'px';p.style.borderRadius=Math.random()>.5?'50%':'2px';p.style.animationDuration=(2+Math.random()*3)+'s';p.style.animationDelay=Math.random()*1.2+'s';document.body.appendChild(p);setTimeout(()=>p.remove(),5500);}}

const bgC=document.getElementById('bgCanvas'),bgX=bgC.getContext('2d');let bgS=[];
function initBg(){bgC.width=innerWidth;bgC.height=innerHeight;bgS=[];const sy=['<','>','/','=','"','}','}','{',';','#','</>','<div>','<p>','<h1>','<img>','<table>','<form>','<video>','<style>','<link>'];const cn=Math.floor((bgC.width*bgC.height)/32000);for(let i=0;i<cn;i++){bgS.push({x:Math.random()*bgC.width,y:Math.random()*bgC.height,s:sy[Math.floor(Math.random()*sy.length)],sz:10+Math.random()*12,sp:.08+Math.random()*.2,op:.025+Math.random()*.05,dr:(Math.random()-.5)*.15});}}
function aBg(){bgX.clearRect(0,0,bgC.width,bgC.height);bgS.forEach(s=>{s.y-=s.sp;s.x+=s.dr;if(s.y<-30){s.y=bgC.height+30;s.x=Math.random()*bgC.width;}if(s.x<-30)s.x=bgC.width+30;if(s.x>bgC.width+30)s.x=-30;}bgX.font=`${s.sz}px "Fira Code",monospace`;bgX.fillStyle=`rgba(0,255,136,${s.op})`;bgX.fillText(s.s,s.x,s.y);});requestAnimationFrame(aBg);}
