<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกคะแนนนักเรียน</title>
    <style>
        body { font-family: 'ChulaCharas', sans-serif; padding: 20px; background-color: #f4f7f6; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        
        .input-form { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr 1fr; gap: 10px; margin-bottom: 25px; align-items: end; }
        .input-group { display: flex; flex-direction: column; }
        label { font-size: 12px; margin-bottom: 5px; font-weight: bold; color: #7f8c8d; }
        input { padding: 10px; border: 1px solid #dcdde1; border-radius: 6px; outline: none; }
        input:focus { border-color: #3498db; }
        
        button { padding: 10px; cursor: pointer; background-color: #3498db; color: white; border: none; border-radius: 6px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #2980b9; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        th { background-color: #f8f9fa; color: #2c3e50; font-weight: 600; }
        .total-cell { font-weight: bold; color: #27ae60; }
        .delete-btn { background-color: #e74c3c; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>📊 ระบบบันทึกคะแนน (100 คะแนนเต็ม)</h2>
    
    <div class="input-form">
        <div class="input-group">
            <label>ชื่อ-นามสกุล</label>
            <input type="text" id="name" placeholder="ชื่อนักเรียน">
        </div>
        <div class="input-group">
            <label>งาน (40)</label>
            <input type="number" id="work" max="40" placeholder="0-40">
        </div>
        <div class="input-group">
            <label>กลางภาค (20)</label>
            <input type="number" id="mid" max="20" placeholder="0-20">
        </div>
        <div class="input-group">
            <label>ปลายภาค (20)</label>
            <input type="number" id="final" max="20" placeholder="0-20">
        </div>
        <div class="input-group">
            <label>จิตพิสัย (10)</label>
            <input type="number" id="spirit" max="10" placeholder="0-10">
        </div>
        <button onclick="addScoreRow()">เพิ่มข้อมูล</button>
    </div>

    <table>
        <thead>
            <tr>
                <th style="text-align: left;">ชื่อ-นามสกุล</th>
                <th>งาน (40)</th>
                <th>กลางภาค (20)</th>
                <th>ปลายภาค (20)</th>
                <th>จิตพิสัย (10)</th>
                <th>รวม (100)</th>
                <th>จัดการ</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- ข้อมูลจะแสดงที่นี่ -->
        </tbody>
    </table>
</div>

<script>
    function addScoreRow() {
        const fields = ['name', 'work', 'mid', 'final', 'spirit'];
        const values = {};
        
        // ดึงค่าและตรวจสอบความถูกต้อง
        for (let id of fields) {
            const el = document.getElementById(id);
            if (!el.value && id !== 'name') values[id] = 0;
            else values[id] = el.value;
        }

        if (!values.name) {
            alert("กรุณากรอกชื่อนักเรียน");
            return;
        }

        // คำนวณคะแนนรวม
        const total = parseFloat(values.work) + parseFloat(values.mid) + 
                      parseFloat(values.final) + parseFloat(values.spirit);

        if (total > 100) {
            alert("คะแนนรวมเกิน 100! กรุณาตรวจสอบข้อมูล");
            return;
        }

        const tbody = document.getElementById('tableBody');
        const row = tbody.insertRow();
        
        row.innerHTML = `
            <td style="text-align: left;">${values.name}</td>
            <td>${values.work}</td>
            <td>${values.mid}</td>
            <td>${values.final}</td>
            <td>${values.spirit}</td>
            <td class="total-cell">${total}</td>
            <td><button class="delete-btn" onclick="this.parentElement.parentElement.remove()">ลบ</button></td>
        `;

        // ล้างข้อมูลหลังบันทึก
        fields.forEach(id => document.getElementById(id).value = '');
        document.getElementById('name').focus();
    }
</script>

</body>
</html>
